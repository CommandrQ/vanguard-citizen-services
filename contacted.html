<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS | Transmission Status</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --vcs-gold: #D4AF37;
            --vcs-purple: #BF94FF;
            --vcs-success: #4cd137; /* A subtle tech green for success */
            --text-main: #F5F5F7;
            --text-dim: rgba(245, 245, 247, 0.5);
            --glass-bg: rgba(10, 10, 10, 0.7); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: #000000;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: grid;
            place-items: center; 
        }

        /* --- 1. BLACKOUT SCREEN --- */
        #blackout-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000;
            z-index: 9999;
            pointer-events: none; 
            opacity: 0;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blackout-active {
            opacity: 1 !important;
            pointer-events: all !important;
        }

        /* --- 2. AMBIENT BACKGROUND GRID --- */
        .cyber-grid {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 70%);
        }

        /* --- 3. CENTERED TERMINAL PANEL --- */
        .glass-panel {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 2px solid var(--vcs-gold); 
            border-radius: 8px;
            padding: 60px 40px;
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }

        .glass-panel.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* --- 4. RADAR / TRANSMISSION ANIMATION --- */
        .radar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .core-dot {
            width: 15px;
            height: 15px;
            background-color: var(--vcs-gold);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 15px var(--vcs-gold);
            transition: background-color 0.5s ease, box-shadow 0.5s ease;
        }

        .wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--vcs-gold);
            border-radius: 50%;
            opacity: 0;
            animation: broadcast 2s infinite cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .wave:nth-child(2) { animation-delay: 0.6s; }
        .wave:nth-child(3) { animation-delay: 1.2s; }

        @keyframes broadcast {
            0% { transform: scale(0.1); opacity: 1; border-width: 2px; }
            100% { transform: scale(1.5); opacity: 0; border-width: 0px; }
        }

        /* Success State for Radar */
        .radar-success .core-dot {
            background-color: var(--vcs-success);
            box-shadow: 0 0 20px var(--vcs-success);
        }
        .radar-success .wave {
            border-color: var(--vcs-success);
            animation: pulseSuccess 2s forwards; /* Stops broadcasting */
        }

        @keyframes pulseSuccess {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* --- 5. TYPOGRAPHY & TERMINAL TEXT --- */
        .page-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.5rem, 3vw, 2rem);
            color: var(--text-main); 
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .terminal-readout {
            font-family: 'Inter', monospace; 
            font-size: 0.85rem;
            line-height: 1.8;
            color: var(--vcs-gold); 
            letter-spacing: 0.1em;
            text-transform: uppercase;
            min-height: 2.5rem; /* Keeps layout stable when text changes */
            transition: color 0.5s ease;
        }

        .terminal-readout.success-text {
            color: var(--text-main);
        }

        /* --- 6. RETURN BUTTON --- */
        .return-btn {
            margin-top: 35px;
            color: var(--true-black);
            background: var(--vcs-gold);
            text-decoration: none;
            font-family: 'Inter', monospace;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 15px 35px;
            border-radius: 4px;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            
            /* Hidden initially */
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
        }

        .return-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .return-btn:hover {
            background: #FFFFFF;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
        }

    </style>
</head>
<body>

    <div id="blackout-screen" class="blackout-active"></div>

    <div class="cyber-grid"></div>

    <article class="glass-panel" id="alert-panel">
        
        <div class="radar-container" id="radar">
            <div class="core-dot"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>

        <h1 class="page-title">Comm-Link Status</h1>

        <p class="terminal-readout" id="terminal-text">ESTABLISHING SECURE CONNECTION...</p>

        <a href="table.html" class="return-btn" id="return-btn">Return to HQ</a>

    </article>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const blackoutScreen = document.getElementById('blackout-screen');
            const alertPanel = document.getElementById('alert-panel');
            const terminalText = document.getElementById('terminal-text');
            const radar = document.getElementById('radar');
            const returnBtn = document.getElementById('return-btn');

            // 1. CINEMATIC ENTRANCE
            setTimeout(() => {
                blackoutScreen.classList.remove('blackout-active');
                
                setTimeout(() => {
                    alertPanel.classList.add('visible');
                    startTransmissionSequence();
                }, 400); // Wait for the fade-in before showing the panel
            }, 100);

            // 2. THE TERMINAL TEXT SEQUENCE
            function startTransmissionSequence() {
                const sequence = [
                    { text: "ENCRYPTING DATA PACKETS...", delay: 1500 },
                    { text: "TRANSMITTING TO VCS SECURE SERVER...", delay: 3500 },
                    { text: "VERIFYING INTEGRITY...", delay: 5000 },
                    { text: "TRANSMISSION SUCCESSFUL.", delay: 6500 }
                ];

                sequence.forEach(step => {
                    setTimeout(() => {
                        terminalText.innerText = step.text;
                        
                        // If it's the final step, trigger the success states
                        if (step.text === "TRANSMISSION SUCCESSFUL.") {
                            triggerSuccess();
                        }
                    }, step.delay);
                });
            }

            // 3. SUCCESS STATE OVERRIDE
            function triggerSuccess() {
                radar.classList.add('radar-success');
                terminalText.classList.add('success-text');
                
                // Show the return button slightly after the text completes
                setTimeout(() => {
                    returnBtn.classList.add('visible');
                }, 800);
            }

            // 4. EXIT PROTOCOL (Fade to Black on Exit)
            returnBtn.addEventListener('click', function(e) {
                e.preventDefault(); 
                const targetUrl = this.getAttribute('href');
                
                blackoutScreen.classList.add('blackout-active');
                
                // Wait for the fade out to finish before navigating back to the table
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 1000);
            });
        });
    </script>
</body>
</html>

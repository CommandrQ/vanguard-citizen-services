<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project V | Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="login-toast" class="login-confirmation"></div>

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper">
        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status" style="display: flex; justify-content: space-between; align-items: center;">
                <h1 id="user-greeting">Welcome</h1>
                <a href="settings.html" class="back-btn">Settings →</a>
            </div>
            <div style="margin-top: 25px;">
                <input type="text" id="hub-search" class="form-input" placeholder="Search resources...">
            </div>
        </header>

        <section id="directory-core" style="flex-grow: 1; overflow-y: auto; padding-bottom: 80px;">
            <nav id="category-bar" style="display: flex; gap: 10px; padding: 20px; justify-content: center;"></nav>
            <article id="directory-list" style="padding: 20px;"></article>
        </section>

        <footer class="glass-module" style="position: absolute; bottom: 0; width: 100%; height: 60px; padding: 0; display: flex; align-items: center; justify-content: center;">
            <p style="font-size: 0.7rem; color: var(--gold); letter-spacing: 2px;">VANGUARD CORE &copy; <span id="current-year"></span></p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>

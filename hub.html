<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project V | Hub</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase Core -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Notification Layer -->
    <div id="login-toast" class="login-confirmation"></div>

    <!-- Deep Canvas Background -->
    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <!-- App Wrapper -->
    <main id="app-wrapper">

        <!-- HEADER: Command Zone -->
        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status" style="display: flex; justify-content: space-between; align-items: center;">
                <h1 id="user-greeting">Welcome</h1>
                <a href="settings.html" class="back-btn">Settings →</a>
            </div>
            
            <div style="margin-top: 25px;">
                <input type="text" id="hub-search" class="form-input" placeholder="Search the Hub...">
            </div>
        </header>

        <!-- CORE: Directory & Navigation -->
        <section id="directory-core" style="flex-grow: 1; overflow-y: auto;">
            <nav id="category-bar" style="display: flex; gap: 10px; padding: 20px; justify-content: center;"></nav>
            
            <article id="directory-list" style="padding: 20px;"></article>
        </section>

        <!-- FOOTER: System Status -->
        <footer id="bottom-glass-panel" class="glass-module" style="padding: 15px; text-align: center;">
            <p style="font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; margin: 0;">
                VANGUARD CITIZEN SERVICES &copy; <span id="current-year"></span>
            </p>
        </footer>

    </main>

    <!-- Unified Logic -->
    <script src="app.js"></script>
</body>
</html>

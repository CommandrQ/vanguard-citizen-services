<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citizen Services</title>
    <style>
        /* --- CORE OS ARCHITECTURE --- */
        :root {
            --v-gold: #d4af37;
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* --- THE BACKGROUND ENGINE --- */
        .starfield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .s1 {
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, var(--v-gold), rgba(0,0,0,0));
            background-size: 200px 200px; opacity: 0.3;
        }

        /* Scanlines placed BEHIND the main content (z-index: 1) */
        .scanlines {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: linear-gradient(to bottom, rgba(18,16,16,0) 50%, rgba(255,255,255,0.02) 50%);
            background-size: 100% 4px;
        }

        /* --- CENTERED LOBBY CONTENT --- */
        .lobby-container {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 5; /* This ensures the text and button sit ABOVE the scanlines */
            text-align: center; padding: 20px;
            animation: systemWake 1s var(--v-curve) forwards;
        }

        @keyframes systemWake {
            from { opacity: 0; transform: scale(0.95); filter: blur(5px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* --- TYPOGRAPHY & LOGO --- */
        .vcs-logo {
            width: 140px; /* Generous size for the centered logo */
            margin-bottom: 25px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2));
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--v-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* The Pulsing Motto */
        .motto {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
            animation: pulseGold 3s infinite;
        }

        @keyframes pulseGold {
            0%, 100% { color: #fff; text-shadow: none; }
            50% { color: var(--v-gold); text-shadow: 0 0 15px var(--v-gold); }
        }

        /* --- THE BUTTON --- */
        .btn-pill {
            font-family: inherit; font-weight: 900; padding: 18px 45px;
            font-size: 1rem; border-radius: 50px; cursor: pointer;
            transition: 0.3s var(--v-curve); border: none; text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn-active {
            background: var(--v-gold); color: #000;
            box-shadow: 0 5px 0 #8a6d0d, 0 10px 20px rgba(0,0,0,0.5);
        }
        .btn-active:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #8a6d0d, 0 15px 25px rgba(212, 175, 55, 0.3);
        }
        .btn-active:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #8a6d0d, 0 5px 10px rgba(0,0,0,0.5);
        }

        button:focus { outline: 3px solid #fff; outline-offset: 4px; }

        /* --- SYSTEM STATUS INDICATOR --- */
        .sys-status {
            margin-top: 30px;
            font-size: 0.85rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .status-online { color: #4ade80; /* Bright Green */ }
        .status-offline { color: #f87171; /* Bright Red */ }

        /* --- FOOTER --- */
        .vanguard-footer {
            border-top: 2px solid #222; padding: 25px 20px;
            background: #000; z-index: 10; text-align: center;
        }
        .vanguard-footer p {
            color: #FFF; 
            font-size: 0.95rem; /* Larger font size as requested */
            font-weight: bold;
            margin: 0; 
            letter-spacing: 1.5px;
        }

        /* --- MOBILE REFINEMENTS --- */
        @media (max-width: 768px) {
            .vcs-logo { width: 110px; }
            .main-title { font-size: 1.8rem; line-height: 1.3; }
            .motto { font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 40px; }
            .btn-pill { padding: 15px 30px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <main class="lobby-container">
        
        <img src="images/vanguardorglogo.png" alt="VCS Logo" class="vcs-logo">
        
        <h1 class="main-title">Welcome To Vanguard Citizen Services</h1>
        
        <p class="motto">Empower. Elevate. Educate.</p>

        <button class="btn-pill btn-active" onclick="handleCommandCenterClick()">ENTER COMMAND CENTER</button>

        <div id="sys-status-text" class="sys-status">SYSTEM INITIALIZING...</div>

    </main>

    <footer class="vanguard-footer">
        <p>&copy; 2026 VANGUARD CITIZEN SERVICES</p>
    </footer>

    <script>
        /* ==========================================================
           SYSTEM ADMIN CONFIGURATION
           Change "Active" to "Offline" to lock down the Fort.
           ========================================================== */
        const SYSTEM = {
            status: "Offline" 
        };

        // Handles the Button Click based on the system string above
        function handleCommandCenterClick() {
            if (SYSTEM.status === "Offline") {
                window.location.href = "uc.html"; // Under Construction page
            } else {
                window.location.href = "directory.html"; // Standard Fort Hub
            }
        }

        // Visually updates the Lobby status on load
        window.onload = () => {
            const statusIndicator = document.getElementById('sys-status-text');
            
            if (SYSTEM.status === "Offline") {
                statusIndicator.innerText = "SYSTEM OFFLINE : MAINTENANCE PROTOCOL";
                statusIndicator.className = "sys-status status-offline";
            } else {
                statusIndicator.innerText = "SYSTEM ACTIVE : SECURE CONNECTION";
                statusIndicator.className = "sys-status status-online";
            }
        };
    </script>
</body>
</html>

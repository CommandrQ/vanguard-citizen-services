<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Citadel | Musubi</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Orbitron', sans-serif;
      background-color: #050505; 
      overflow: hidden; 
    }

    #title-screen {
      height: 100vh;
      width: 100vw;
      background-image: url('images/introbkgd.png');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: opacity 1.5s ease-in-out; 
    }

    #title-screen::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
    }

    .title-container {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #ffffff;
    }

    .company-name {
      font-size: 1.2rem;
      letter-spacing: 4px;
      margin-bottom: 10px;
      text-transform: uppercase;
      color: #a0a0a0;
    }

    .game-title {
      font-size: 4.5rem;
      margin: 0;
      letter-spacing: 6px;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
    }

    .location-text {
      font-size: 1.5rem;
      color: #ff0055; /* A contrasting neon pink/red for the zone name */
      letter-spacing: 3px;
      margin-top: 15px;
      margin-bottom: 50px;
      text-shadow: 0 0 10px #ff0055;
    }

    #start-button {
      padding: 15px 50px;
      font-size: 1.5rem;
      font-family: 'Orbitron', sans-serif;
      background: rgba(0, 255, 255, 0.1);
      color: #00ffff;
      border: 2px solid #00ffff;
      box-shadow: 0 0 10px #00ffff inset, 0 0 10px #00ffff;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s ease;
      animation: pulse 2s infinite; 
    }

    #start-button:hover {
      background: #00ffff;
      color: #000000;
      box-shadow: 0 0 20px #00ffff inset, 0 0 30px #00ffff;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    #game-world {
      color: #00ffff;
      padding: 50px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="title-screen">
    <div class="title-container">
      <h2 class="company-name">Vanguard Citizen Services</h2>
      <h1 class="game-title">WELCOME TO MUSUBI</h1>
      <h3 class="location-text">/// DESTINATION: THE CITADEL ///</h3>
      <button id="start-button">PRESS START</button>
    </div>
  </div>

  <div id="game-world" style="display: none;">
    <h1>The Citadel Terminal Online.</h1>
    <p>Awaiting hero input...</p>
    </div>

  <script>
    document.getElementById('start-button').addEventListener('click', function() {
      const titleScreen = document.getElementById('title-screen');
      const gameWorld = document.getElementById('game-world');

      this.style.background = '#ffffff';
      this.style.color = '#000000';
      this.innerText = 'LOADING CITADEL...';

      setTimeout(() => {
        titleScreen.style.opacity = '0';
        
        setTimeout(() => {
          titleScreen.style.display = 'none';
          gameWorld.style.display = 'block';
          document.body.style.overflow = 'auto'; 
        }, 1500); 
      }, 800); 
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | The Gate</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase Core -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* RADIANT LOGO EFFECT */
        .vanguard-logo {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6)) 
                    drop-shadow(0 0 30px rgba(212, 175, 55, 0.2));
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5)); }
            50% { filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8)); }
        }

        /* THE EVOLVED GATE BUTTON */
        .gate-button {
            position: relative;
            overflow: hidden; /* Clips the fill effect */
            background: #000 !important;
            color: var(--gold) !important;
            border: 2px solid var(--gold) !important; /* Slightly thicker border */
            padding: 22px 50px !important; /* Increased size */
            font-size: 1.2rem !important; /* Increased text size */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 4px; /* Sharper, professional edges */
            transition: color 0.4s ease, transform 0.3s var(--v-curve), box-shadow 0.3s ease;
            z-index: 1;
        }

        /* The Filling Liquid */
        .gate-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--gold);
            transition: left 0.5s var(--v-curve);
            z-index: -1; /* Sits behind the text */
        }

        /* Hover State Logic */
        .gate-button:hover {
            color: #000 !important; /* Flips text color for contrast */
            transform: scale(1.05); /* Slight size increase */
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .gate-button:hover::before {
            left: 0; /* Slides the fill into position */
        }

        /* Transition Overlay */
        #fade-overlay {
            position: fixed; inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: opacity 1s ease;
        }
        #fade-overlay.active { opacity: 1; }

        .gate-footer {
            margin-top: 60px;
            font-size: 0.7rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body class="gate-body">

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <div id="fade-overlay"></div>

    <main id="app-wrapper" style="justify-content: center; align-items: center; background: transparent; box-shadow: none;">
        
        <div id="gate-interface" style="text-align: center; padding: 40px; width: 100%;">
            <!-- BRANDING -->
            <div class="vanguard-branding" style="margin-bottom: 50px;">
                <img src="images/vanguardorglogo.png" alt="Vanguard Logo" class="vanguard-logo">
                <h1 style="font-size: 2.2rem; letter-spacing: 10px; color: var(--gold); margin: 0; font-weight: 900; text-transform: uppercase;">Vanguard</h1>
                <p style="font-size: 0.75rem; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-top: 5px;">Citizen Services</p>
            </div>

            <!-- ENLARGED FILL BUTTON -->
            <div style="width: 100%; display: flex; justify-content: center;">
                <button onclick="initiateUplink()" class="gate-button">
                    Initialize Uplink
                </button>
            </div>

            <footer class="gate-footer">
                Vanguard Citizen Services &copy; 2026
            </footer>
        </div>

    </main>

    <script src="app.js"></script>
    <script>
        function initiateUplink() {
            const overlay = document.getElementById('fade-overlay');
            const gate = document.getElementById('gate-interface');
            
            overlay.classList.add('active');
            gate.style.opacity = '0';
            gate.style.transform = 'scale(0.95)';
            gate.style.transition = 'opacity 0.8s ease, transform 0.8s ease';

            setTimeout(() => {
                window.location.href = 'hub.html';
            }, 1000);
        }

        window.onpageshow = function(event) {
            if (event.persisted) {
                document.getElementById('fade-overlay').classList.remove('active');
                document.getElementById('gate-interface').style.opacity = '1';
                document.getElementById('gate-interface').style.transform = 'scale(1)';
            }
        };
    </script>
</body>
</html>

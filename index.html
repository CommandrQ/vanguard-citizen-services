<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard OS | Lobby</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;">
        
        <img src="images/vanguardorglogo.png" alt="Vanguard Logo" style="width: 280px; margin-bottom: 40px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));">

        <h1 class="gold-text-outline" style="font-size: 2.5rem; margin-bottom: 10px;">Vanguard OS</h1>
        
        <div style="margin-bottom: 40px;">
            <span class="status-dot"></span>
            <span style="font-size: 0.7rem; color: #00FF00; letter-spacing: 2px; text-transform: uppercase; font-weight: 900;">System Active</span>
        </div>

        <button class="btn-pill-gold" onclick="location.href='uc.html'" style="padding: 15px 40px; font-size: 1rem;">Enter Command Center</button>

        <p style="margin-top: 30px; font-family: monospace; color: var(--v-soft-grey); font-size: 0.8rem; letter-spacing: 3px;">
            EMPOWER // EDUCATE // ELEVATE
        </p>
    </main>

    <footer class="vanguard-footer" style="position: fixed; bottom: 0; width: 100%;">
        <p style="color: #FFFFFF; font-size: 0.65rem;">&copy; 2026 VANGUARD CITIZEN SERVICES</p>
    </footer>
</body>
</html>

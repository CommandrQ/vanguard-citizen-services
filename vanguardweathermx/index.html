<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD MX // WEATHER COMMAND</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>VANGUARD COMMAND // WEATHER MX</h1>
        <div class="controls">
            <div class="search-container">
                <input type="text" id="location-search" placeholder="Enter City/Zip" autocomplete="off">
                <ul id="autocomplete-results" class="hidden"></ul>
            </div>
            <button id="geo-btn" title="Sync GPS Coordinates">CURRENT LOCATION</button>
            <button id="update-btn">UPDATE FEED</button>
            <button id="reset-loc-btn">RESET</button>
            <button id="notify-btn">ALERTS: OFF</button>
        </div>
    </header>

    <main id="dashboard" class="status-green">
        <div id="status-banner">
            <h2 id="primary-alert">AWAITING SECTOR DATA</h2>
        </div>

        <div class="info-grid">
            <section class="action-panel">
                <h3>CITIZEN PROTOCOL</h3>
                <div id="beginner-action">
                    <p>Provide location to initiate monitoring.</p>
                </div>
            </section>

            <section class="expert-panel">
                <h3>CHASER BULLETIN (RAW FEED)</h3>
                <div id="chaser-bulletin" class="scroll-box">
                    <p>System standing by...</p>
                </div>
            </section>
        </div>
    </main>

    <div id="alert-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title">TELEMETRY DATA</h2>
            <div id="modal-body" class="scroll-box"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

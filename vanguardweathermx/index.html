<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANGUARD COMMAND // WEATHER MX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>VANGUARD COMMAND // WEATHER MX</h1>
        <div class="search-container">
            <input type="text" id="location-search" placeholder="Enter City/Zip" autocomplete="off">
            <ul id="autocomplete-results" class="hidden"></ul>
        </div>
        <div class="controls">
            <button id="geo-btn">LOCATION</button>
            <button id="update-btn">UPDATE</button>
            <button id="reset-loc-btn">RESET</button>
            <button id="notify-btn">ALERTS</button>
        </div>
    </header>

    <main id="dashboard" class="status-green">
        <div id="status-banner">
            <h2 id="primary-alert">AWAITING SECTOR DATA</h2>
            <div id="last-scan-container">
                LAST SCAN: <span id="last-scan-time">NEVER</span>
            </div>
        </div>

        <div class="info-grid">
            <section class="action-panel">
                <h3>CITIZEN PROTOCOL</h3>
                <div id="beginner-action">
                    <p>Initiate monitoring to receive tactical directives.</p>
                </div>
            </section>

            <section id="expert-panel" class="expert-panel">
                <h3>CHASER BULLETIN</h3>
                <div id="chaser-bulletin" class="scroll-box">
                    <p>System standing by...</p>
                </div>
            </section>
        </div>
    </main>

    <div id="alert-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title">TELEMETRY DATA</h2>
            <div id="modal-body" class="scroll-box"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS | The Round Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="lock-screen table-bg" style="background-color: #000; margin: 0;">

    <div id="loader-screen">
        <div class="loader-content">
            <div class="terminal-text" id="sys-status">BOOTING VANGUARD OS...</div>
            <span id="load-percent">0%</span>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div class="terminal-text" id="sys-log">ESTABLISHING SECURE CONNECTION...</div>
        </div>
        <div class="scanlines"></div> </div>

    <main id="main-stage" class="hidden-stage">
        
        <div class="holo-table">
            <div class="ring ring-outer"></div>
            <div class="ring ring-middle"></div>
            <div class="ring ring-inner"></div>
            <div class="core-light"></div>
        </div>

        <div class="orbital-container">
            
            <a href="archive.html" class="seat seat-1">
                <div class="text-group">
                    <span class="seat-label">The Archive</span>
                </div>
            </a>

            <a href="citizens.html" class="seat seat-2">
                <div class="text-group">
                    <span class="seat-label">The Citizens</span>
                </div>
            </a>

            <a href="horizon.html" class="seat seat-3">
                <div class="text-group">
                    <span class="seat-label">The Horizon</span>
                </div>
            </a>

            <a href="vanguard.html" class="seat seat-4">
                <div class="text-group">
                    <span class="seat-label">The Vanguard</span>
                </div>
            </a>

        </div>
    </main>

    <script>
        (function() {
            const loadText = document.getElementById('load-percent');
            const progressBar = document.getElementById('progress-bar');
            const loader = document.getElementById('loader-screen');
            const mainStage = document.getElementById('main-stage');
            const sysLog = document.getElementById('sys-log');
            
            if (!loadText || !loader || !mainStage) return;

            let progress = 0;
            const logMessages = [
                "ESTABLISHING SECURE CONNECTION...",
                "DECRYPTING ARCHIVES...",
                "CALIBRATING SHIELD PROTOCOLS...",
                "ALIGNING KNIGHTS...",
                "SYSTEM READY."
            ];

            function simulateLoad() {
                // Random jump between 1% and 18%
                let increment = Math.floor(Math.random() * 18) + 1;
                progress += increment;

                if (progress > 100) progress = 100;
                
                loadText.innerText = progress + '%';
                progressBar.style.width = progress + '%';

                // Change log text based on progress
                if (progress > 20 && progress < 50) sysLog.innerText = logMessages[1];
                if (progress >= 50 && progress < 85) sysLog.innerText = logMessages[2];
                if (progress >= 85 && progress < 100) sysLog.innerText = logMessages[3];
                if (progress === 100) sysLog.innerText = logMessages[4];

                if (progress < 100) {
                    // Random pause (50ms to 250ms) to simulate CPU thinking
                    setTimeout(simulateLoad, Math.random() * 200 + 50);
                } else {
                    // The Flashy Entrance Trigger
                    setTimeout(() => {
                        loader.style.opacity = '0'; 
                        setTimeout(() => {
                            loader.style.display = 'none';
                            mainStage.classList.remove('hidden-stage');
                            mainStage.classList.add('flash-entrance'); 
                        }, 500);
                    }, 600); 
                }
            }
            
            setTimeout(simulateLoad, 300);
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VCS | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 8px; width: 350px; border: 1px solid #334155; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 4px; box-sizing: border-box; }
        
        .btn-login { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .btn-register { width: 100%; padding: 10px; background: transparent; border: 1px solid #475569; color: #94a3b8; cursor: pointer; border-radius: 4px; margin-top: 15px; font-size: 0.8rem; }
        .btn-register:hover { border-color: var(--accent); color: white; }

        #error-msg { color: #fca5a5; font-size: 0.8rem; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vanguard Hub</h2>
    <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 20px;">Identity Verification Required</p>
    
    <form id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn-login">AUTHORIZE ENTRY</button>
    </form>

    <div id="error-msg"></div>

    <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">
    
    <p style="font-size: 0.75rem; color: #94a3b8;">New to the Vanguard?</p>
    <button class="btn-register" onclick="window.location.href='register.html'">REQUEST INDUCTION (REGISTER)</button>
</div>

<script>
    // USE YOUR ACTUAL KEYS HERE (Since it's on GitHub Pages)
    const _supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById('error-msg');
        errorDiv.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            // If the user isn't recognized or password is wrong
            errorDiv.innerText = "Access Denied: " + error.message;
            errorDiv.style.display = 'block';
        } else {
            // Success! Direct to the dashboard
            window.location.href = 'dashboard.html';
        }
    });
</script>

</body>
</html>

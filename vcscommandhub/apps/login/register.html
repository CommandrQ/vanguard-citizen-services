<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VCS | Citizen Induction</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 8px; width: 350px; border: 1px solid #334155; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        #status { margin-top: 15px; font-size: 0.85rem; padding: 10px; border-radius: 4px; display: none; }
        .err { background: #450a0a; color: #fca5a5; display: block; }
        .success { background: #064e3b; color: #6ee7b7; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>Citizen Induction</h2>
    <form id="reg-form">
        <input type="text" id="username" placeholder="Callsign (Username)" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">REGISTER IDENTITY</button>
    </form>
    <div id="status"></div>
    <p style="font-size: 0.8rem; margin-top: 15px;"><a href="index.html" style="color: var(--accent);">Already Registered? Login</a></p>
</div>

<script>
    // 1. Direct Hardcoding for GitHub Pages (No .env or Vite logic)
    const SB_URL = 'https://ushgtakupwrlbzzsbivv.supabase.co/rest/v1/'; 
    const SB_KEY = 'sb_publishable_d9MEVgwoyhbB7uuzZ8Th_g_QYHVdNsg';
    
    // Initialize the client
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    document.getElementById('reg-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('status');
        status.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const username = document.getElementById('username').value;

        // 2. The Sign-Up Logic
        const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                // This metadata maps to your 'profiles' table via the SQL trigger we made
                data: { display_name: username } 
            }
        });

        if (error) {
            status.innerText = "Error: " + error.message;
            status.className = 'err';
            status.style.display = 'block';
        } else {
            status.innerText = "Success! Check your email or try logging in.";
            status.className = 'success';
            status.style.display = 'block';
        }
    });
</script>

</body>
</html>

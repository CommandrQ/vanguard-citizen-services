<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VCS | Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 8px; width: 350px; border: 1px solid #334155; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        #status { margin-top: 15px; font-size: 0.85rem; padding: 10px; border-radius: 4px; display: none; }
        .err { background: #450a0a; color: #fca5a5; display: block !important; }
        .success { background: #064e3b; color: #6ee7b7; display: block !important; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Citizen Induction</h2>
        <form id="reg-form">
            <input type="text" id="username" placeholder="Callsign" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">REGISTER</button>
        </form>
        <div id="status"></div>
        <p style="font-size: 0.8rem; margin-top: 15px;"><a href="index.html" style="color: var(--accent);">Back to Login</a></p>
    </div>

    <script type="module">
        // PASTE YOUR ACTUAL KEYS HERE
        const _supabase = supabase.createClient('https://your-id.supabase.co', 'your-anon-key');

        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.className = ''; 
            status.innerText = "Processing...";

            const { data, error } = await _supabase.auth.signUp({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                options: { data: { username: document.getElementById('username').value } }
            });

            if (error) {
                status.innerText = error.message;
                status.classList.add('err');
            } else {
                status.innerText = "Check your email for the confirmation link!";
                status.classList.add('success');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster - Vanguard Knights</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Techy Background Overlay */
        #space-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1a33 0%, #000 100%);
            z-index: 1;
        }

        #fade-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            z-index: 9999;
            pointer-events: none;
            opacity: 1; 
            transition: opacity 0.8s ease-out;
        }

        /* Main UI Container */
        #ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        /* Pulsing Header */
        .roster-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            animation: pulseText 2s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .roster-blurb {
            font-size: 1rem;
            color: #a0c4ff;
            margin-bottom: 2.5rem;
            line-height: 1.5;
            max-width: 600px;
        }

        /* Personnel Card Styles */
        .card-carousel {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .personnel-card {
            width: 100%;
            max-width: 450px;
            background: rgba(10, 25, 45, 0.8);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            display: none; /* Controlled by JS */
            animation: cardSlide 0.4s ease-out;
        }

        @keyframes cardSlide {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .active-card { display: block; }

        .knight-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .knight-rank {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #ff3366;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
        }

        .knight-bio {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ccd;
            margin-bottom: 20px;
            text-align: left;
        }

        .contact-info {
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            padding-top: 15px;
            text-align: left;
        }

        .contact-label {
            font-size: 0.8rem;
            color: #00ffff;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        .knight-link {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .knight-link:hover { color: #00ffff; text-shadow: 0 0 10px #00ffff; }

        /* Navigation Arrows */
        .nav-arrow {
            background: transparent;
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #00ffff;
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .nav-arrow:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }

        /* Return Button */
        .back-btn {
            margin-top: 3rem;
            background: transparent;
            border: 1px solid #ff3366;
            color: #ff3366;
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .back-btn:hover { background: #ff3366; color: #fff; box-shadow: 0 0 20px #ff3366; }

        @media (max-width: 600px) {
            .roster-header { font-size: 1.4rem; }
            .personnel-card { padding: 20px; width: 280px; }
            .knight-bio { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>
    <div id="space-bg"></div>

    <div id="ui-layer">
        <h1 class="roster-header">Vanguard Knights Roster</h1>
        <p class="roster-blurb">
            The Vanguard Knights are a multiversal collective of specialists dedicated to achieving the VCS vision. 
            Defenders of Musubi, architects of progress.
        </p>

        <div class="card-carousel">
            <button class="nav-arrow" onclick="changeCard(-1)">&#10094;</button>
            
            <div id="knight-container">
                </div>

            <button class="nav-arrow" onclick="changeCard(1)">&#10095;</button>
        </div>

        <button class="back-btn" onclick="goBack()">Return to Menu</button>
    </div>

    <script src="force-refresh.js"></script>

    <script>
        /**
         * ROSTER CONFIGURATION
         * Add new Knights here. Follow the format.
         */
        const knights = [
            {
                name: "Quincy Jones",
                rank: "Co-Founder | Chief Vision Officer",
                bio: "A veteran of the Armed Forces with a deep background in ecosystem operations at tech giants Best Buy and Apple. Quincy leads the long-term strategic direction of the Vanguard, ensuring our technological reach matches our multiversal ambition.",
                pref: "Website",
                contact: "https://cmdrq.vcscitizen.org",
                isLink: true
            },
            {
                name: "Kona Agpalza",
                rank: "Co-Founder | Chief Operating Officer",
                bio: "Bringing disciplined expertise from the Armed Forces and logistics mastery from Best Buy, Kona drives the internal engine of VCS. As COO, they ensure the Knights remain mission-ready and that every VCS objective is executed with surgical precision.",
                pref: "Email",
                contact: "[Your Email Here]", // You can update this later
                isLink: false
            }
        ];

        let currentIdx = 0;

        function renderRoster() {
            const container = document.getElementById('knight-container');
            container.innerHTML = knights.map((k, index) => `
                <div class="personnel-card ${index === currentIdx ? 'active-card' : ''}">
                    <h2 class="knight-name">${k.name}</h2>
                    <span class="knight-rank">${k.rank}</span>
                    <p class="knight-bio">${k.bio}</p>
                    <div class="contact-info">
                        <span class="contact-label">Contact Preference:</span>
                        ${k.isLink 
                            ? `<a href="${k.contact}" class="knight-link" target="_blank">${k.pref}</a>` 
                            : `<span class="knight-link">${k.pref}: ${k.contact}</span>`}
                    </div>
                </div>
            `).join('');
        }

        function changeCard(step) {
            currentIdx = (currentIdx + step + knights.length) % knights.length;
            renderRoster();
        }

        // Standard Fade Logic
        window.onload = () => { document.getElementById('fade-overlay').style.opacity = '0'; };

        function goBack() {
            const overlay = document.getElementById('fade-overlay');
            overlay.style.transition = "opacity 0.5s ease-in";
            overlay.style.opacity = '1';
            setTimeout(() => { window.location.href = 'menu.html'; }, 600);
        }

        renderRoster();
    </script>
</body>
</html>

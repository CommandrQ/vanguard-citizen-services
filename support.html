<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Talk to Us</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase Core -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- LAYER 1: The Persistent Starfield -->
    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <!-- LAYER 2: The Unified App Wrapper -->
    <main id="app-wrapper">

        <!-- HEADER -->
        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status">
                <a href="hub.html" class="back-btn">← GO BACK</a>
                <h1 id="user-greeting">Support</h1>
            </div>
        </header>

        <!-- SCROLLABLE CORE -->
        <section id="directory-core">
            <div id="directory-list">
                
                <!-- THE UPLINK CARD -->
                <div class="link-card">
                    <h3 class="card-title">Talk to us</h3>
                    <p class="card-desc">Need help with tech or the sanctuary? Send a message and we will get back to you.</p>
                    
                    <!-- CATEGORY -->
                    <div class="form-group" style="width: 100; text-align: left; margin-bottom: 20px;">
                        <label style="font-size: 0.8rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">WHAT DO YOU NEED?</label>
                        <select id="f-category" class="settings-input" style="width: 100%; max-width: none; margin-top: 10px;">
                            <option value="Tech Support">Tech Help</option>
                            <option value="General">General Question</option>
                            <option value="Guild">Joining the Guild</option>
                        </select>
                    </div>

                    <!-- NAME -->
                    <div class="form-group" style="width: 100; text-align: left; margin-bottom: 20px;">
                        <label style="font-size: 0.8rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">YOUR NAME</label>
                        <input type="text" id="f-name" placeholder="Name Loading..." class="settings-input" style="width: 100%; max-width: none; margin-top: 10px;">
                    </div>

                    <!-- MESSAGE -->
                    <div class="form-group" style="width: 100%; text-align: left; margin-bottom: 25px;">
                        <label style="font-size: 0.8rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">MESSAGE</label>
                        <textarea id="f-msg" placeholder="Tell us what's happening..." class="settings-input" style="width: 100%; max-width: none; height: 180px; margin-top: 10px; text-align: left;"></textarea>
                    </div>

                    <!-- SLOW FILL BUTTON -->
                    <button onclick="compileDraft()" class="gate-button" style="width: 100%; padding: 20px; font-size: 1.1rem;">
                        Send Message
                    </button>
                    
                    <div id="sys-msg" style="margin-top: 25px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;"></div>
                </div>

            </div>
        </section>

        <!-- FOOTER -->
        <footer id="bottom-glass-panel" class="glass-module">
            <div class="footer-container">
                <p class="footer-msg active">Direct Uplink Active</p>
            </div>
        </footer>

    </main>

    <script src="app.js"></script>
    <script>
        // Auto-fill from identity
        document.addEventListener('DOMContentLoaded', () => {
            const cached = JSON.parse(localStorage.getItem('vanguard_profile'));
            if (cached && cached.name) {
                document.getElementById('f-name').value = cached.name;
            }
        });

        function compileDraft() {
            const cat = document.getElementById('f-category').value;
            const name = document.getElementById('f-name').value.trim();
            const msgBody = document.getElementById('f-msg').value.trim();
            const sys = document.getElementById('sys-msg');

            if (!name || !msgBody) {
                sys.innerText = "Error: Provide name and message.";
                sys.style.color = "#ff4d4d";
                return;
            }

            sys.innerText = "Initializing Uplink...";
            sys.style.color = "var(--gold)";

            const destination = "support@vcscitizen.org";
            const subject = encodeURIComponent(`[${cat}] Uplink from ${name}`);
            const body = encodeURIComponent(
`CITIZEN IDENTIFICATION: ${name}
CATEGORY: ${cat}

MESSAGE:
-------------------------
${msgBody}
-------------------------
END TRANSMISSION`
            );

            setTimeout(() => {
                window.location.href = `mailto:${destination}?subject=${subject}&body=${body}`;
                sys.innerText = "Uplink Established.";
                sys.style.color = "#4ade80";
            }, 800);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Support | Triage</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- HUD ARCHITECTURE --- */
        body, html {
            overflow: hidden; /* Locks the main page */
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .hud-header, .vanguard-footer {
            flex-shrink: 0;
            background: #000;
            z-index: 20;
        }

        .hud-workspace {
            flex: 1;
            overflow-y: auto; /* Only this section scrolls */
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            justify-items: center;
            padding: 40px;
            gap: 40px;
            -webkit-overflow-scrolling: touch;
        }

        /* --- THEMED HEADER BUTTON --- */
        .btn-header-gold {
            background: var(--v-gold);
            color: #000 !important;
            font-weight: 900;
            padding: 8px 20px;
            text-decoration: none;
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border: none;
            box-shadow: 0 3px 0 #8a6d0d; /* 3D depth */
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-header-gold:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 0 #8a6d0d;
        }

        .btn-header-gold:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #8a6d0d;
        }

        /* --- 3D GLASSY CARDS (OPAQUE) --- */
        .support-card {
            background: linear-gradient(135deg, #050505 0%, #111 100%);
            border-top: 1px solid rgba(212, 175, 55, 0.5);
            border-left: 1px solid rgba(212, 175, 55, 0.3);
            border-right: 1px solid #111;
            border-bottom: 1px solid #000;
            padding: 50px 30px;
            max-width: 420px;
            text-align: center;
            position: relative;
            box-shadow: 20px 20px 50px rgba(0, 0, 0, 0.9);
            border-radius: 4px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        .support-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* TEXT OUTLINE (BLACK) */
        .gold-text-outline {
            color: var(--v-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }

        .support-desc {
            font-size: 1rem;
            line-height: 1.5;
            color: #eee;
            margin: 20px 0 30px 0;
            text-shadow: 1px 1px 3px #000;
        }

        /* 3D BUTTONS (BODY) */
        .btn-vanguard-solid {
            background: var(--v-gold);
            color: #000 !important;
            font-weight: 900;
            padding: 15px 30px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 0 #8a6d0d;
            transition: 0.2s;
        }

        .btn-vanguard-solid:hover { transform: translateY(-2px); }
        .btn-vanguard-solid:active { transform: translateY(2px); box-shadow: 0 1px 0 #8a6d0d; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 850px) {
            .hud-workspace {
                grid-template-columns: 1fr;
                padding: 60px 20px;
            }
            .support-card { width: 100%; }
            .btn-header-gold { padding: 6px 15px; font-size: 0.65rem; }
        }
    </style>
</head>
<body class="fixed-hud">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header" style="border-bottom: 2px solid var(--v-gold); padding: 15px 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:30px; margin-right:10px;">
                <span class="gold-text-outline" style="font-size: 0.9rem;">SUPPORT TRIAGE</span>
            </div>
            <nav>
                <button class="btn-header-gold" onclick="location.href='directory.html'">DIRECTORY</button>
            </nav>
        </div>
    </header>

    <main class="hud-workspace">
        
        <section class="support-card" style="animation-delay: 0.1s;">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">✉️</div>
            <h2 class="gold-text-outline">Email Support</h2>
            <p class="support-desc">
                Good for general questions. We'll reply as soon as we're back at the desk.
            </p>
            <a href="mailto:support@vcscitizen.org" class="btn-vanguard-solid">SEND EMAIL</a>
        </section>

        <section class="support-card" style="animation-delay: 0.3s;">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">🛡️</div>
            <h2 class="gold-text-outline">Live Chat</h2>
            <p class="support-desc">
                Join our Discord community. Best for quick help or voice calls.
            </p>
            <button class="btn-vanguard-solid" onclick="window.open('https://discord.gg/YOUR_CODE', '_blank')">JOIN DISCORD</button>
        </section>

    </main>

    <footer class="vanguard-footer" style="border-top: 2px solid var(--v-gold); padding: 10px;">
        <p style="font-size: 0.6rem; color: #fff; text-align: center; margin: 0;">&copy; 2026 Vanguard Citizen Services. All Rights Reserved.</p>
    </footer>

</body>
</html>

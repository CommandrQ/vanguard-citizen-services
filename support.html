<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="vanguard-universe" aria-hidden="true"><div class="gold-star-layer"></div></div>
    <main id="app-wrapper">
        <header id="top-glass-panel" class="glass-module" style="padding: 30px;">
            <div class="citizen-status" style="display: flex; justify-content: space-between; align-items: center;">
                <a href="hub.html" class="back-btn">← HUB</a>
                <h1 style="font-size: 1.4rem; color: var(--gold); margin: 0;">Support</h1>
            </div>
        </header>

        <section id="directory-core">
            <div id="directory-list">
                <div class="link-card">
                    <h3 class="card-title">Talk to Us</h3>
                    
                    <div style="width: 100%; text-align: left; margin-bottom: 20px;">
                        <label style="font-size: 0.7rem; color: var(--gold); font-weight: 800;">TOPIC</label>
                        <select id="f-category" class="form-input" style="margin-top: 8px;">
                            <option value="Tech Support">Tech Help</option>
                            <option value="General">General Inquiry</option>
                        </select>
                    </div>

                    <div style="width: 100%; text-align: left; margin-bottom: 20px;">
                        <label style="font-size: 0.7rem; color: var(--gold); font-weight: 800;">YOUR NAME</label>
                        <input type="text" id="f-name" class="form-input" style="margin-top: 8px;" placeholder="Full Name">
                    </div>

                    <div style="width: 100%; text-align: left; margin-bottom: 20px;">
                        <label style="font-size: 0.7rem; color: var(--gold); font-weight: 800;">MESSAGE</label>
                        <textarea id="f-msg" class="form-input" style="margin-top: 8px; height: 150px;" placeholder="Describe your issue..."></textarea>
                    </div>

                    <button onclick="compileDraft()" class="gate-button" style="width: 100%;">Initialize Uplink</button>
                    <div id="sys-msg" style="margin-top: 20px; font-size: 0.8rem; font-weight: 700;"></div>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
    <script>
        function compileDraft() {
            const name = document.getElementById('f-name').value;
            const msg = document.getElementById('f-msg').value;
            if(!name || !msg) return alert("Identify yourself and provide a message.");
            window.location.href = `mailto:support@vcscitizen.org?subject=Support&body=${msg}`;
        }
    </script>
</body>
</html>

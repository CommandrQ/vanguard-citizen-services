<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | VSR Support</title>
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="techhelp.css"> 
    
    <style>
        .support-card {
            background: var(--solid-bg);
            border: 1px solid var(--v-gold);
            border-radius: 20px;
            padding: clamp(25px, 5vw, 40px);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            text-align: center;
            margin: 0 auto;
        }

        .instruction-text {
            background: rgba(212, 175, 55, 0.05);
            padding: 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            line-height: 1.5;
            border: 1px dashed var(--v-gold);
            text-align: center;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="universe-bg">
        <div class="star-layer stars-1"></div>
    </div>

    <div class="viewport-wrapper">
        <header class="page-header">
            <h1>Customer Service</h1>
            <div class="header-actions">
                <a href="techhelp.html" class="btn-return">Back to Support</a>
            </div>
        </header>

        <article class="support-card">
            <div class="instruction-text">
                <strong>PROTOCOL:</strong> Fill out the data fields below. When you click <strong>Review Draft</strong>, your local email app will open. Please verify the transmission details before sending.
            </div>

            <div class="form-group">
                <label>Inquiry Category</label>
                <select id="s-category" class="form-input">
                    <option value="General Question">General Question</option>
                    <option value="Work Order Issue">Work Order Issue</option>
                    <option value="Business Request">Business Request</option>
                </select>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="s-name" class="form-input" placeholder="Enter Full Name">
            </div>

            <div class="form-group">
                <label>Return Email</label>
                <input type="email" id="s-email" class="form-input" placeholder="Where should we reply?">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="s-msg" class="form-input" style="min-height: 100px; resize: vertical;" placeholder="How can we assist you today?"></textarea>
            </div>

            <button class="btn-request" onclick="compileSupportDraft()" style="margin-top: 15px;">Review Draft</button>
            
            <div id="support-status" style="text-align: center; margin-top: 15px; font-size: 0.8rem; font-weight: bold; min-height: 1.2em;"></div>
        </article>
    </div>

    <footer class="vanguard-footer">
        Powered by Vanguard Citizen Services &copy; <span id="current-year"></span>
    </footer>

    <script>
        document.getElementById('current-year').innerText = new Date().getFullYear();

        function compileSupportDraft() {
            const category = document.getElementById('s-category').value;
            const name = document.getElementById('s-name').value.trim();
            const email = document.getElementById('s-email').value.trim();
            const message = document.getElementById('s-msg').value.trim();
            const status = document.getElementById('support-status');

            if (!name || !message) {
                status.innerText = "Error: Name and Message are required.";
                status.style.color = "#f87171";
                return;
            }

            status.innerText = "Opening mail client...";
            status.style.color = "#D4AF37";

            const subject = `VSR Support Request: ${category}`;
            const body = `--- VANGUARD CUSTOMER SERVICE DISPATCH ---
Category: ${category}
Name: ${name}
Reply Email: ${email || "Not provided"}

MESSAGE DETAILS:
${message}

--- END OF TRANSMISSION ---`;

            const mailto = `mailto:commandrq@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            setTimeout(() => {
                window.location.href = mailto;
                status.innerText = "Draft compiled successfully.";
                status.style.color = "#4ade80"; 
            }, 500);
        }
    </script>
</body>
</html>

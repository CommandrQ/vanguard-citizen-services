<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Toward | About Vanguard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- CORE OS ARCHITECTURE --- */
        body, html {
            overflow: hidden; height: 100%;
            display: flex; flex-direction: column;
            background: #000; margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .scanlines {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(255, 255, 255, 0.02) 50%);
            background-size: 100% 4px; z-index: 1; pointer-events: none;
        }

        .hud-header {
            flex-shrink: 0; background: #000; border-bottom: 2px solid var(--v-gold); z-index: 10;
        }

        .header-content {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; width: 100%; box-sizing: border-box;
        }

        /* --- BUTTON STATES --- */
        .btn-pill {
            font-family: inherit; font-weight: 900; padding: 10px 22px;
            font-size: 0.85rem; border-radius: 50px; cursor: pointer;
            transition: 0.3s var(--v-curve); border: none; display: inline-block;
            text-align: center;
        }

        .btn-active {
            background: var(--v-gold) !important; color: #000 !important;
            box-shadow: 0 4px 0 #8a6d0d;
        }
        .btn-active:hover {
            transform: translateY(-2px); box-shadow: 0 6px 15px rgba(212, 175, 55, 0.3);
        }

        /* --- INFO VIEWPORT --- */
        .os-viewport {
            flex: 1; overflow-y: auto; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; z-index: 5;
        }

        .info-card {
            background: #0a0a0a; border: 1px solid #333; border-top: 4px solid var(--v-gold);
            width: 100%; max-width: 800px; padding: 40px; margin-bottom: 30px;
            box-shadow: 20px 20px 40px rgba(0,0,0,1);
            animation: systemWake 0.6s var(--v-curve) forwards;
        }

        .info-card h2 {
            font-size: 1.8rem; color: #fff; margin-bottom: 20px; font-weight: 900;
        }

        .info-card p {
            font-size: 1.15rem; color: #ddd; line-height: 1.8; margin-bottom: 15px;
        }

        .highlight {
            color: var(--v-gold); font-weight: 700;
        }

        /* --- FOOTER DESKTOP LAYOUT --- */
        .vanguard-footer {
            border-top: 2px solid #222; padding: 20px; background: #000; z-index: 10;
        }

        .footer-content {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1000px; margin: 0 auto; width: 100%; gap: 10px;
        }
        
        .footer-nav {
            display: flex; gap: 15px; align-items: center;
        }

        /* --- MOBILE REFINEMENTS --- */
        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 12px; padding: 15px 10px; text-align: center; }
            .header-content nav { flex-direction: row; justify-content: center; width: 100%; flex-wrap: wrap; }
            .info-card { padding: 25px; }
            .info-card h2 { font-size: 1.4rem; }
            .info-card p { font-size: 1rem; }
            
            /* FOOTER STACKING ON MOBILE */
            .footer-content { 
                flex-direction: column; justify-content: center; text-align: center; gap: 15px; 
            }
            .footer-nav {
                justify-content: center; width: 100%;
            }
        }
    </style>
</head>
<body class="fixed-hud">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="header-content">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:35px;">
                <span class="gold-text-outline" style="font-size: 1.2rem;">About Vanguard</span>
            </div>
            <nav style="display: flex; gap: 10px;">
                <button class="btn-pill btn-active" style="padding: 6px 18px; font-size: 0.75rem;" onclick="location.href='directory.html'">DIRECTORY</button>
                <button class="btn-pill btn-active" style="padding: 6px 18px; font-size: 0.75rem;" onclick="location.href='support.html'">CUSTOMER SERVICE</button>
            </nav>
        </div>
    </header>

    <main class="os-viewport" id="mission-feed">
        </main>

    <footer class="vanguard-footer">
        <div class="footer-content">
            <p style="color: #FFF; font-size: 0.75rem; margin: 0;">&copy; 2026 VANGUARD CITIZEN SERVICES</p>
            <nav class="footer-nav">
                <a href="legal.html" style="color: #bbb; text-decoration: none; font-size: 0.8rem;">LEGAL</a>
                <span style="color: #333;">|</span>
                <a href="settings.html" style="color: #FFF; text-decoration: none; font-weight: bold; font-size: 1rem;">⚙️ SYSTEM SETTINGS</a>
            </nav>
        </div>
    </footer>

    <script>
        /* --- HUMAN-CENTRIC STORY DATABASE --- */
        const MISSION_DATA = [
            {
                title: "Our Story",
                content: "Vanguard Citizen Services was started by <span class='highlight'>Quincy Jones</span> and <span class='highlight'>Kona Agpalza</span>. With backgrounds in the military and complex tech systems, we saw how confusing the digital world had become. We built Vanguard to strip away that confusion and put the power back in your hands."
            },
            {
                title: "Our Vision",
                content: "We believe technology should make your life easier, not harder. Too often, tech jargon is used to make people feel left out. We act as your personal guide, making sure you can confidently step into the future without feeling overwhelmed."
            },
            {
                title: "The Vanguard Knights",
                content: "The Knights are our dedicated team of helpers. Our promise to you is simple: <span class='highlight'>we make hard things easy.</span> If you have a computer or WiFi problem we haven't seen before, we won't give up—we know exactly where to find the answer to get you back on track."
            },
            {
                title: "How We Help",
                content: "<strong>1. Friendly Tech Support:</strong> Expert help that stays by your side until it works.<br><strong>2. Easy Learning:</strong> Simple, clear guides to help you master your devices safely.<br><strong>3. Building Community:</strong> Bringing neighbors together to create a secure, informed, and inspired local network."
            },
            {
                title: "Our Founders",
                content: "<strong>Quincy Jones:</strong> Chief Vision Officer<br><strong>Kona Agpalza:</strong> Chief Operational Officer<br><br>Together, they lead the mission to protect, empower, and elevate our community."
            }
        ];

        const feed = document.getElementById('mission-feed');

        MISSION_DATA.forEach((item, index) => {
            const card = document.createElement('section');
            card.className = 'info-card';
            card.style.animationDelay = (index * 0.15) + 's';
            card.innerHTML = `
                <h2 class="gold-text-outline">${item.title}</h2>
                <p>${item.content}</p>
            `;
            feed.appendChild(card);
        });
    </script>
</body>
</html>

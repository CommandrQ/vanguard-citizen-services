<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Citizen Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .resource-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%;
            overflow-y: auto; max-height: 35vh; padding: 5px; -webkit-overflow-scrolling: touch;
        }
        .resource-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 14px 8px; border-radius: 12px; font-size: 0.8rem;
            font-weight: 600; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .resource-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-content {
            background: #050505; border: 1px solid var(--gold); border-radius: 24px;
            width: 100%; max-width: 450px; max-height: 80vh; padding: 30px;
            display: flex; flex-direction: column; gap: 20px; transform: scale(0.9); transition: 0.3s var(--v-curve);
        }
        .modal-overlay.active { opacity: 1; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        #modal-body { overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .resource-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .resource-item h3 { color: var(--gold); font-size: 1rem; margin-bottom: 5px; }
        .resource-item p { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 12px; }

        @media (max-width: 480px) { .resource-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="universe"><div class="star-layer"></div></div>

    <header class="vanguard-header">
        <h1 id="welcome-text" class="gold-text-outline" style="text-transform: uppercase; font-size: 1.3rem;">Welcome, Citizen</h1>
    </header>

    <main>
        <div class="glass-card animate-wake">
            <div style="text-align: center;">
                <h3 style="color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;">Active Population</h3>
                <h1 id="pop-count" class="loading-state" style="font-size: 2.8rem; font-weight: 900;">--</h1>
            </div>

            <hr>

            <h3 style="font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase;">Direct Access</h3>
            <div class="resource-grid">
                <button class="resource-btn" onclick="window.location.href='support.html'">Customer Service</button>
                <button class="resource-btn" onclick="window.location.href='settings.html'">Settings</button>
            </div>

            <hr style="margin-top: 10px;">

            <h3 style="font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase;">Network Resources</h3>
            <div class="resource-grid">
                <button class="resource-btn" onclick="openResourceModal('Tech Help')">Tech Help</button>
            </div>
        </div>
    </main>

    <footer class="vanguard-footer">
        <p id="footer-text">Powered Vanguard Citizen Services © 2026</p>
    </footer>

    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target.id==='modal-overlay') forceCloseModal()">
        <div class="modal-content">
            <h2 id="modal-title" style="color: var(--gold); border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 10px;">Category</h2>
            <div id="modal-body"></div>
            <button class="gold-pill" onclick="forceCloseModal()" style="border-color: #444; color: #888;">CLOSE</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const INTERNAL_DATABASE = {
            "Tech Help": [
                {
                    title: "Vanguard Support & Repair",
                    desc: "Simple tech help and support for local citizens.",
                    url: "https://vsr.vcscitizen.org"
                }
            ]
        };

        async function syncIdentity() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('citizens').select('full_name').eq('auth_id', session.user.id).single();
                if (data) document.getElementById('welcome-text').innerText = `Welcome, ${data.full_name.split(' ')[0]}`;
            }
        }

        async function fetchPopulation() {
            const { count, error } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
            const el = document.getElementById('pop-count');
            if (!error) { el.classList.remove('loading-state'); el.innerText = count; }
        }

        function openResourceModal(category) {
            const modal = document.getElementById('modal-overlay');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = category;
            
            body.innerHTML = '<p class="loading-state" style="text-align:center; padding: 20px;">[ DECRYPTING ]</p>';
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);

            setTimeout(() => {
                const items = INTERNAL_DATABASE[category];
                body.innerHTML = '';
                if (items) {
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'resource-item';
                        div.innerHTML = `<h3>${item.title}</h3><p>${item.desc}</p><a href="${item.url}" class="gold-pill" style="padding: 8px 20px; font-size: 0.7rem;">GO ➞</a>`;
                        body.appendChild(div);
                    });
                }
            }, 400);
        }

        function forceCloseModal() {
            const modal = document.getElementById('modal-overlay');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function runFooterCycle() {
            const el = document.getElementById('footer-text');
            const original = "Powered Vanguard Citizen Services © 2026";
            const motto = "Empower . Educate . Elevate";
            setInterval(() => {
                el.classList.add('footer-glow');
                setTimeout(() => {
                    el.style.opacity = '0';
                    setTimeout(() => {
                        el.innerText = motto; el.classList.remove('footer-glow'); el.style.opacity = '1';
                        setTimeout(() => {
                            el.style.opacity = '0';
                            setTimeout(() => { el.innerText = original; el.style.opacity = '1'; }, 500);
                        }, 2500);
                    }, 500);
                }, 1200);
            }, 9000);
        }

        window.onload = () => { syncIdentity(); fetchPopulation(); runFooterCycle(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Toward | Directory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html {
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(255, 255, 255, 0.02) 50%);
            background-size: 100% 4px;
            z-index: 1; 
            pointer-events: none;
        }

        /* --- HEADER: STYLED FOR FORT TOWARD --- */
        .hud-header {
            flex-shrink: 0;
            background: #000;
            border-bottom: 2px solid var(--v-gold);
            z-index: 10;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- BUTTONS: HIGH VISIBILITY --- */
        .btn-pill {
            font-family: inherit;
            font-weight: 900;
            padding: 10px 22px;
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s var(--v-curve);
            display: inline-block;
            text-align: center;
        }

        /* The "OFF" State - Clearly Visible Outline */
        .btn-inactive {
            background: transparent;
            border: 1px solid #555; /* Visible grey border */
            color: #bbb; /* Light grey text */
        }
        .btn-inactive:hover {
            border-color: var(--v-gold);
            color: #fff;
        }

        /* The "ON" State - Solid Gold */
        .btn-active {
            background: var(--v-gold);
            border: 1px solid var(--v-gold);
            color: #000;
            box-shadow: 0 4px 0 #8a6d0d;
        }

        /* Customer Service Slim Button */
        .btn-customer {
            background: var(--v-gold);
            color: #000;
            border: none;
            padding: 8px 20px;
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 50px;
            box-shadow: 0 3px 0 #8a6d0d;
        }

        /* --- CONTENT FEED --- */
        .os-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .portal-card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-left: 5px solid var(--v-gold);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 25px;
            animation: systemWake 0.6s var(--v-curve) forwards;
        }

        /* --- FOOTER --- */
        .vanguard-footer {
            border-top: 2px solid #222;
            padding: 20px;
            background: #000;
            z-index: 10;
        }

        .settings-link {
            color: #FFF;
            text-decoration: none;
            font-size: 1rem; /* Bigger for accessibility */
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* --- MOBILE STACKING --- */
        @media (max-width: 650px) {
            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .os-viewport { padding: 20px; }
            .portal-card { flex-direction: column; text-align: left; }
            .card-action-btn { width: 100%; }
        }
    </style>
</head>
<body class="fixed-hud">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="header-content">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:35px;">
                <span class="gold-text-outline" style="font-size: 1.2rem;">Fort Toward Directory</span>
            </div>
            <nav>
                <button class="btn-customer" onclick="location.href='support.html'">CUSTOMER SERVICE</button>
            </nav>
        </div>
    </header>

    <nav style="display: flex; gap: 12px; padding: 20px; overflow-x: auto; border-bottom: 1px solid #222; justify-content: center;" id="category-row">
        </nav>

    <main class="os-viewport" id="portal-feed">
        </main>

    <footer class="vanguard-footer">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; width: 100%;">
            <p style="color: #FFF; font-size: 0.8rem; margin: 0;">&copy; 2026 VANGUARD CITIZEN SERVICES</p>
            <a href="settings.html" class="settings-link">⚙️ SYSTEM SETTINGS</a>
        </div>
    </footer>

    <script>
        const VANGUARD_DB = {
            "Services": [
                { title: "Network Triage", tag: "Tech Help", desc: "Expert WiFi and network setup for your home or business. We ensure your digital perimeter is secure.", link: "support.html", btnText: "REQUEST HELP" },
                { title: "Hardware Repair", tag: "Maintenance", desc: "Diagnostic services for failing computers or smart devices. Get a clear fix from a Knight.", link: "support.html", btnText: "GET DIAGNOSIS" }
            ],
            "Partner Alliances": [
                { title: "Hardin Tech Solutions", tag: "Certified Partner", desc: "Local commercial IT specialists authorized for enterprise-level Vanguard deployments.", link: "https://hardintech.com", btnText: "VISIT SITE" }
            ],
            "Academy": [
                { title: "Digital Safety 101", tag: "Education", desc: "Learn how to protect your identity and avoid modern scams with simple, clear steps.", link: "https://git.vanguard.org/academy", btnText: "START LEARNING" }
            ]
        };

        const navRow = document.getElementById('category-row');
        const feed = document.getElementById('portal-feed');

        // Create the buttons initially
        Object.keys(VANGUARD_DB).forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.onclick = (e) => switchCategory(cat, btn);
            navRow.appendChild(btn);
            
            // Default first category to active
            if (index === 0) switchCategory(cat, btn);
        });

        function switchCategory(cat, targetBtn) {
            // Update all buttons in the row
            document.querySelectorAll('#category-row button').forEach(b => {
                b.className = 'btn-pill btn-inactive';
            });
            // Highlight the clicked one
            targetBtn.className = 'btn-pill btn-active';

            // Clear and reload the feed
            feed.innerHTML = '';
            VANGUARD_DB[cat].forEach(item => {
                const card = document.createElement('section');
                card.className = 'portal-card';
                card.innerHTML = `
                    <div style="flex: 1;">
                        <div style="font-size: 0.85rem; color: var(--v-gold); font-weight: 700; margin-bottom: 5px; letter-spacing: 1px;">${item.tag}</div>
                        <h2 style="font-size: 1.5rem; color: #fff; margin-bottom: 12px; font-weight: 900;">${item.title}</h2>
                        <p style="font-size: 1.15rem; color: #ddd; line-height: 1.6; margin: 0;">${item.desc}</p>
                    </div>
                    <a href="${item.link}" class="btn-pill btn-active card-action-btn" style="padding: 15px 30px; font-size: 0.9rem; text-decoration: none;">${item.btnText}</a>
                `;
                feed.appendChild(card);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Command | Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="directory-body">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="logo-area">
            <img src="images/vanguardorglogo.png" alt="VCS" class="hud-logo" style="width: 40px; height: auto;">
            <span class="gold-text" style="margin-left: 10px;">Operational Directory</span>
        </div>
        <nav class="hud-nav">
            <button class="btn-gold" onclick="showRequestModal()">REQUEST SERVICE</button>
        </nav>
    </header>

    <div class="category-tuner" id="cat-bar"></div>

    <main class="dual-pane">
        <section class="pane">
            <h2 class="pane-title">VANGUARD RESOURCES</h2>
            <div class="list" id="res-list"></div>
        </section>

        <section class="pane">
            <h2 class="pane-title">AUTHORIZED ALLIANCES</h2>
            <div class="list" id="all-list"></div>
        </section>
    </main>

    <div id="request-modal" class="modal hidden">
        <div class="modal-box">
            <h3 class="gold-text">MISSION SIGNAL</h3>
            <textarea id="mission-details" placeholder="Describe the service required..."></textarea>
            <button class="btn-gold" onclick="alert('Manual Triage: Please email vanguard@example.com for now.')">SUBMIT</button>
            <button class="btn-link" onclick="document.getElementById('request-modal').classList.add('hidden')">CANCEL</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function showRequestModal() {
            document.getElementById('request-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>

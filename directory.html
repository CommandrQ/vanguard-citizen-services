<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Citizen Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- PAGE SPECIFIC STYLES --- */
        
        /* 2-Column Resource Grid */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            overflow-y: auto;
            max-height: 40vh; /* Allows scrolling if many buttons are added */
            padding-right: 5px;
            -webkit-overflow-scrolling: touch;
        }

        /* Custom Scrollbar for the Grid */
        .resource-grid::-webkit-scrollbar { width: 4px; }
        .resource-grid::-webkit-scrollbar-track { background: transparent; }
        .resource-grid::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }

        .resource-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 15px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .resource-btn:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
        }

        /* --- MODAL (POPUP WINDOW) STYLES --- */
        .modal-overlay {
            position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: none; 
            justify-content: center; align-items: center; 
            z-index: 100; padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 20px;
            width: 100%; max-width: 450px;
            max-height: 80vh; overflow-y: auto;
            padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,1), 0 0 20px rgba(212, 175, 55, 0.15);
            animation: systemWake 0.3s var(--v-curve);
        }

        .resource-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: left;
        }

        .resource-item h3 { color: var(--gold); font-size: 1.1rem; margin-bottom: 8px; text-align: left; }
        .resource-item p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px; text-align: left; }
        
        .modal-close {
            background: transparent; border: 1px solid #555; color: #fff;
            padding: 10px; border-radius: 50px; cursor: pointer; width: 100%;
            margin-top: 10px; font-weight: 700; transition: 0.3s; text-transform: uppercase;
        }
        .modal-close:hover { border-color: var(--error-red); color: var(--error-red); }

        @media (max-width: 480px) {
            .resource-grid { grid-template-columns: 1fr; } /* Stacks to 1 column on very small phones if needed, but 2 works if text is short */
        }
    </style>
</head>
<body>

    <div class="universe"><div class="star-layer"></div></div>

    <header class="vanguard-header">
        <h1 id="welcome-text" class="gold-text-outline" style="font-size: 1.5rem; text-transform: uppercase; margin: 0; text-align: center;">Welcome, Citizen</h1>
    </header>

    <main>
        <div class="glass-card">
            
            <div id="population-stat" style="width: 100%;">
                <h3 style="color: var(--gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;">Active Population</h3>
                <h1 id="pop-count" style="font-size: 3rem; font-weight: 900; margin-top: 5px;">--</h1>
            </div>

            <hr style="width: 80%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">

            <h3 style="font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px;">Network Resources</h3>
            <div class="resource-grid" id="resource-buttons">
                <button class="resource-btn" onclick="openResourceModal('Tech Help')">Tech Help</button>
                </div>

        </div>
    </main>

    <footer class="vanguard-footer">
        <p id="footer-text">Powered Vanguard Citizen Services © 2026</p>
    </footer>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" id="modal-content">
            <h2 id="modal-title" style="margin-bottom: 10px; border-bottom: 1px solid var(--gold); padding-bottom: 10px;">Category</h2>
            <div id="modal-body" style="display: flex; flex-direction: column; gap: 15px;">
                </div>
            <button class="modal-close" onclick="forceCloseModal()">CLOSE WINDOW</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // --- AUTHENTICATION & GREETING ---
        async function syncIdentity() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('citizens').select('full_name').eq('auth_id', session.user.id).single();
                if (data) {
                    const firstName = data.full_name.split(' ')[0];
                    document.getElementById('welcome-text').innerText = `Welcome, ${firstName}`;
                }
            }
        }

        // --- POPULATION FETCH ---
        async function fetchPopulation() {
            const { count, error } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
            if (!error) document.getElementById('pop-count').innerText = count;
        }

        // --- JSON FETCH & MODAL LOGIC ---
        async function openResourceModal(category) {
            const modal = document.getElementById('modal-overlay');
            const modalTitle = document.getElementById('modal-title');
            const modalBody = document.getElementById('modal-body');

            // 1. Show Loading State
            modalTitle.innerText = category;
            modalBody.innerHTML = '<p style="text-align: center; color: #888;">Decrypting Intel...</p>';
            modal.style.display = 'flex';

            try {
                // 2. Fetch the JSON file
                const response = await fetch('json/resources.json');
                const data = await response.json();

                // 3. Find the category and populate
                if (data[category] && data[category].length > 0) {
                    modalBody.innerHTML = ''; // Clear loading text
                    
                    data[category].forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'resource-item';
                        div.innerHTML = `
                            <h3>${item.title}</h3>
                            <p>${item.description}</p>
                            <a href="${item.url}" class="gold-pill" style="display: inline-block; text-align: center; width: auto; font-size: 0.75rem;">GO ➞</a>
                        `;
                        modalBody.appendChild(div);
                    });
                } else {
                    modalBody.innerHTML = '<p style="text-align: center; color: #888;">No active resources in this sector.</p>';
                }
            } catch (error) {
                modalBody.innerHTML = '<p style="text-align: center; color: var(--error-red);">Error establishing link to resource ledger.</p>';
            }
        }

        function closeModal(event) {
            // Close if clicking the dark overlay outside the box
            if (event.target.id === 'modal-overlay') {
                document.getElementById('modal-overlay').style.display = 'none';
            }
        }
        function forceCloseModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        // --- FOOTER ANIMATION CYCLE ---
        function runFooterCycle() {
            const el = document.getElementById('footer-text');
            const original = `Powered Vanguard Citizen Services © ${new Date().getFullYear()}`;
            const motto = "Empower . Educate . Elevate";

            setInterval(() => {
                el.classList.add('footer-glow');
                setTimeout(() => {
                    el.style.opacity = '0';
                    setTimeout(() => {
                        el.innerText = motto;
                        el.style.opacity = '1';
                        el.classList.remove('footer-glow');
                        setTimeout(() => {
                            el.style.opacity = '0';
                            setTimeout(() => {
                                el.innerText = original;
                                el.style.opacity = '1';
                            }, 500);
                        }, 2000);
                    }, 500);
                }, 1000);
            }, 8000);
        }

        // --- INITIALIZATION ---
        window.onload = () => {
            syncIdentity();
            fetchPopulation();
            runFooterCycle();
        };
    </script>
</body>
</html>

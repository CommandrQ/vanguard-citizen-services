<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fort Toward | Community Directory</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- DESIGN VARIABLES --- */
        :root { 
            --gold: #d4af37; 
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1); 
            --bg-deep: #0a0a0a;
        }

        /* --- LAYOUT ENGINE --- */
        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; 
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- SANCTUARY BACKGROUND --- */
        .universe-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star-layer { position: absolute; inset: -500px; background-repeat: repeat; animation: starDrift linear infinite; }
        .stars-1 { background-image: radial-gradient(3.5px 3.5px at 25px 50px, #fff, transparent), radial-gradient(2.5px 2.5px at 150px 150px, #fff, transparent); background-size: 400px 400px; animation-duration: 160s; opacity: 0.3; }
        @keyframes starDrift { from { transform: translateY(0); } to { transform: translateY(500px); } }

        .viewport-wrapper {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; width: 100%;
            padding: 15px 15px 55px 15px; box-sizing: border-box;
        }

        /* --- THE SANCTUARY TICKER --- */
        .announcement-ticker {
            width: 100%; max-width: 850px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom: 2px solid var(--gold);
            border-radius: 12px 12px 0 0;
            padding: 10px 15px; overflow: hidden; white-space: nowrap;
            z-index: 2;
        }
        .ticker-content {
            display: inline-block;
            color: #fff; font-size: 0.8rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1.5px;
            padding-left: 100%; animation: tickerScroll 35s linear infinite;
        }
        @keyframes tickerScroll { 0% { transform: translateX(0); } 95% { transform: translateX(-100%); } 100% { transform: translateX(-100%); } }

        /* --- THE MAIN DIRECTORY --- */
        .directory-terminal {
            width: 100%; max-width: 850px;
            flex: 1 1 auto; min-height: 0; 
            display: flex; flex-direction: column;
            padding: 25px 25px 15px; gap: 20px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 0 24px 24px;
        }

        .pop-container { text-align: center; }
        .pop-label { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .pop-count { font-size: min(3.5rem, 10vw); font-weight: 900; margin: 5px 0 0; letter-spacing: -1px; }

        .white-divider { width: 100%; height: 1px; background: #fff; border: none; box-shadow: 0 0 8px rgba(255,255,255,0.3); opacity: 0.5; }

        /* --- CATEGORY SELECTOR --- */
        .category-menu {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .cat-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px 22px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s;
            white-space: nowrap;
        }
        .cat-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }

        /* --- LINK CARDS --- */
        .directory-content {
            flex: 1; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 15px; padding-right: 5px;
        }
        .directory-content::-webkit-scrollbar { width: 4px; }
        .directory-content::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .link-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 25px 20px; display: flex; flex-direction: column; 
            align-items: center; text-align: center; transition: 0.3s;
        }
        .link-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.06); border-color: var(--gold); }
        .card-title { font-size: 1.15rem; margin-bottom: 10px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-desc { font-size: 0.85rem; color: #ccc; line-height: 1.5; margin-bottom: 20px; flex-grow: 1; }
        
        .card-link {
            color: var(--gold); font-weight: bold; text-decoration: none; 
            border: 1px solid var(--gold); padding: 8px 30px; border-radius: 20px; 
            font-size: 0.8rem; text-transform: uppercase; transition: 0.3s;
        }
        .card-link:hover { background: var(--gold); color: #000; }

        /* --- FOOTER --- */
        .vanguard-footer {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: #000; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        .footer-text { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="star-layer stars-1"></div>
    </div>

    <div class="viewport-wrapper">
        <div class="announcement-ticker">
            <div class="ticker-content">
                ::: WELCOME TO THE SANCTUARY ::: LOCAL TECH COACHING AND SUPPORT FOR HARDIN & JEFFERSON COUNTIES ::: BUILDING CONFIDENCE THROUGH EDUCATION :::
            </div>
        </div>

        <article class="directory-terminal">
            <div class="pop-container">
                <div class="pop-label">Community Population</div>
                <h1 id="population-count" class="pop-count">Connecting...</h1>
            </div>

            <hr class="white-divider">

            <nav class="category-menu" id="category-bar"></nav>

            <div class="directory-content" id="directory-list"></div>
        </article>
    </div>

    <footer class="vanguard-footer">
        <p class="footer-text">Empower • Educate • Elevate</p>
    </footer>

    <script>
        // Supabase configuration
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // GROUNDED, SIMPLE CATEGORIES
        const directoryData = {
            "Support & Repair": [
                { title: "Tech Coaching", desc: "Patient, one-on-one help to make your technology work for you.", url: "vsr/techhelp.html" },
                { title: "Device Repair", desc: "Reliable in-person fixes for phones, tablets, and computers.", url: "#" }
            ],
            "Movies & Games": [
                { title: "Vanguard Movies", desc: "Original comedies and shorts produced by our local team.", url: "#" },
                { title: "Game Arena", desc: "Experience our original fighting and card game projects.", url: "#" }
            ],
            "Learning Center": [
                { title: "The Basics", desc: "Simple guides for security and staying connected. Coming soon.", url: "#" }
            ],
            "Sanctuary Info": [
                { title: "Customer Service", desc: "Need a hand? Contact our support team directly.", url: "support.html" },
                { title: "Our Mission", desc: "Learn about the values and vision behind Fort Toward.", url: "legal.html" }
            ]
        };

        const ui = {
            popCount: document.getElementById('population-count'),
            catBar: document.getElementById('category-bar'),
            dirList: document.getElementById('directory-list')
        };

        async function initSystem() {
            fetchPopulation();
            setInterval(fetchPopulation, 30000); // Sync every 30 seconds
            renderCategories();
        }

        async function fetchPopulation() {
            try {
                const { count, error } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
                if (error) throw error;
                ui.popCount.innerText = count.toLocaleString();
            } catch (err) {
                ui.popCount.innerText = "Online";
            }
        }

        function renderCategories() {
            const categories = Object.keys(directoryData);
            ui.catBar.innerHTML = categories.map((cat, index) => `
                <button class="cat-btn ${index === 0 ? 'active' : ''}" onclick="selectCategory('${cat}', this)">
                    ${cat}
                </button>
            `).join('');
            
            renderCards(categories[0]);
        }

        window.selectCategory = function(catName, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards(catName);
        }

        function renderCards(catName) {
            ui.dirList.innerHTML = directoryData[catName].map(res => `
                <div class="link-card">
                    <h3 class="card-title">${res.title}</h3>
                    <p class="card-desc">${res.desc}</p>
                    <a href="${res.url}" class="card-link">Open</a>
                </div>
            `).join('');
        }

        window.onload = initSystem;
    </script>
</body>
</html>

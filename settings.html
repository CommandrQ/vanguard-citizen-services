<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Toward | Identity Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html {
            overflow: hidden; height: 100%; display: flex; flex-direction: column;
            background: #000; margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .scanlines { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(255, 255, 255, 0.02) 50%); background-size: 100% 4px; z-index: 1; pointer-events: none; }

        .hud-header { flex-shrink: 0; background: #000; border-bottom: 2px solid var(--v-gold); z-index: 10; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; }

        .os-viewport {
            flex: 1; overflow-y: auto; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; z-index: 5;
        }

        /* --- IDENTITY CARD & SUCCESS ANIMATION --- */
        .identity-card {
            background: #0a0a0a; border: 1px solid #333; border-top: 4px solid var(--v-gold);
            width: 100%; max-width: 600px; padding: 40px;
            box-shadow: 20px 20px 40px rgba(0,0,0,1);
            position: relative;
            transition: 0.3s ease;
        }

        @keyframes successPulse {
            0% { box-shadow: 0 0 0px var(--v-gold); border-color: #333; }
            50% { box-shadow: 0 0 50px var(--v-gold); border-color: var(--v-gold); }
            100% { box-shadow: 20px 20px 40px rgba(0,0,0,1); border-color: #333; }
        }

        .sync-success {
            animation: successPulse 0.6s var(--v-curve);
        }

        .status-header { margin-bottom: 30px; text-align: center; }
        
        .rank-badge {
            display: inline-block; padding: 6px 20px; border: 1px solid var(--v-gold);
            color: var(--v-gold); font-weight: 900; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 12px;
            background: rgba(212, 175, 55, 0.05);
        }

        .field-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: var(--v-gold); font-weight: 900; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        
        input {
            width: 100%; background: #111; border: 1px solid #333; padding: 12px;
            color: #fff; font-size: 1rem; border-radius: 5px; box-sizing: border-box;
        }
        input:focus { border-color: var(--v-gold); outline: none; }

        .btn-pill {
            width: 100%; font-weight: 900; padding: 15px; font-size: 0.9rem;
            border-radius: 50px; cursor: pointer; transition: 0.3s; border: none; margin-top: 10px;
        }
        .btn-active { background: var(--v-gold) !important; color: #000 !important; box-shadow: 0 4px 0 #8a6d0d; }
        
        .btn-restore { 
            background: transparent !important; 
            border: 1px solid #555 !important; 
            color: #ffffff !important; 
        }

        .btn-logout { background: transparent !important; border: 1px solid #444 !important; color: #888 !important; }

        .sys-msg { font-size: 0.85rem; margin-top: 15px; text-align: center; font-weight: bold; min-height: 1.2em; }

        @media (max-width: 650px) {
            .header-content { flex-direction: column; gap: 12px; text-align: center; }
            .identity-card { padding: 25px; }
        }
    </style>
</head>
<body class="fixed-hud">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="header-content">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:35px;">
                <span class="gold-text-outline" style="font-size: 1.2rem;">Identity Terminal</span>
            </div>
            <button class="btn-pill btn-active" style="padding: 6px 18px; width: auto; font-size: 0.75rem;" onclick="location.href='directory.html'">RETURN TO FORT</button>
        </div>
    </header>

    <main class="os-viewport">
        <div class="identity-card" id="main-card">
            <div class="status-header">
                <h2 id="welcome-msg" class="gold-text-outline" style="font-size: 1.8rem; margin: 0;">Identity: Guest</h2>
                <div id="rank-display" class="rank-badge">RANK: UNDEFINED</div>
            </div>

            <div id="form-area">
                <div class="field-group">
                    <label>Full Name</label>
                    <input type="text" id="full_name" placeholder="Citizen Name">
                </div>
                <div class="field-group">
                    <label>Citizen Handle (Callsign)</label>
                    <input type="text" id="handle" placeholder="Callsign">
                </div>
                <div class="field-group">
                    <label>Email Address (Identity Key)</label>
                    <input type="email" id="email" placeholder="name@email.com">
                </div>
                <div class="field-group">
                    <label>Discord ID</label>
                    <input type="text" id="discord_id" placeholder="Username#0000">
                </div>

                <button class="btn-pill btn-active" onclick="saveIdentity()">SUBMIT CHANGES</button>
                <button class="btn-pill btn-restore" style="margin-top:20px;" onclick="restoreIdentity()">RESTORE FROM EMAIL</button>
            </div>

            <div id="logout-area" style="display:none; text-align: center; margin-top: 30px; border-top: 1px solid #222; padding-top: 20px;">
                <button class="btn-pill btn-logout" onclick="logout()">LOGOUT (CLEAR LOCAL MEMORY)</button>
            </div>

            <div id="sys-response" class="sys-msg"></div>
        </div>
    </main>

    <footer class="vanguard-footer" style="padding: 20px; text-align: center; z-index: 10;">
        <p style="color: #555; font-size: 0.7rem; margin: 0;">Vanguard OS v3.3 | Authorized Access Only</p>
    </footer>

    <script>
        // --- SUPABASE CONFIGURATION ---
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // --- THE AUDIO KERNEL ---
        function playSuccessSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gain = context.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, context.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(440, context.currentTime + 0.1); 
            
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);

            oscillator.connect(gain);
            gain.connect(context.destination);

            oscillator.start();
            oscillator.stop(context.currentTime + 0.1);
        }

        function triggerSuccessUI() {
            const card = document.getElementById('main-card');
            card.classList.remove('sync-success');
            void card.offsetWidth; 
            card.classList.add('sync-success');
            playSuccessSound();
        }

        async function saveIdentity() {
            const emailValue = document.getElementById('email').value.trim();
            const fullNameValue = document.getElementById('full_name').value.trim();

            if(!emailValue || !fullNameValue) {
                msg("Name and Email are required.", "red");
                return;
            }

            const citizenData = {
                full_name: fullNameValue,
                handle: document.getElementById('handle').value.trim(),
                email: emailValue,
                discord_id: document.getElementById('discord_id').value.trim()
            };

            msg("Saving changes...", "#888");

            const { error } = await supabaseClient.from('citizens').upsert([citizenData], { onConflict: 'email' });

            if (error) {
                msg("Error: " + error.message, "red");
            } else {
                fetchAndSync(emailValue);
                triggerSuccessUI(); 
                msg("Changes submitted successfully.", "var(--v-gold)");
            }
        }

        async function restoreIdentity() {
            const emailValue = document.getElementById('email').value.trim();
            if(!emailValue) { msg("Please enter your email address.", "red"); return; }

            msg("Checking records...", "#888");
            fetchAndSync(emailValue);
        }

        async function fetchAndSync(email) {
            const { data, error } = await supabaseClient.from('citizens').select('*').eq('email', email).single();

            if (data) {
                if (!data.rank) data.rank = "UNDEFINED";
                localStorage.setItem('vanguard_citizen', JSON.stringify(data));
                syncUI();
                msg("Identity restored.", "var(--v-gold)");
            } else {
                msg("Email not found in our records.", "red");
            }
        }

        function logout() {
            localStorage.removeItem('vanguard_citizen');
            location.reload();
        }

        function syncUI() {
            const citizen = JSON.parse(localStorage.getItem('vanguard_citizen'));
            if (citizen) {
                document.getElementById('welcome-msg').innerText = "Identity: " + citizen.full_name;
                document.getElementById('rank-display').innerText = "RANK: " + (citizen.rank || "UNDEFINED").toUpperCase();
                document.getElementById('logout-area').style.display = 'block';
                
                document.getElementById('full_name').value = citizen.full_name;
                document.getElementById('handle').value = citizen.handle;
                document.getElementById('email').value = citizen.email;
                document.getElementById('discord_id').value = citizen.discord_id;
            }
        }

        function msg(text, color) {
            const m = document.getElementById('sys-response');
            m.innerText = text; m.style.color = color;
        }

        window.onload = syncUI;
    </script>
</body>
</html>

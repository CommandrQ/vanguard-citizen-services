<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fort Toward | Citizen Records</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1); 
        }

        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        .universe-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star-layer { position: absolute; inset: -500px; background-image: radial-gradient(2px 2px at 20px 30px, #fff, transparent); background-size: 300px 300px; animation: drift 180s linear infinite; opacity: 0.2; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(500px); } }

        .viewport-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; width: 100%; padding: 15px; box-sizing: border-box;
        }

        /* --- THE TERMINAL --- */
        .settings-terminal {
            width: 100%; max-width: 550px;
            max-height: 90vh; display: flex; flex-direction: column;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .terminal-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .greeting-text { color: var(--gold); font-size: 1.6rem; font-weight: 800; text-transform: uppercase; margin: 0; }
        .sub-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; margin-top: 5px; }

        .settings-content { padding: 30px; overflow-y: auto; }
        
        /* --- FORM ELEMENTS --- */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #fff; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; font-weight: 900; }
        
        .form-input {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            padding: 14px; color: #fff; font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }
        .form-input:focus { outline: none; border-color: var(--gold); background: rgba(255, 255, 255, 0.1); }

        .btn-gold {
            width: 100%; background: var(--gold); color: #000; border: none; padding: 16px; border-radius: 50px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }

        .restore-link { display: block; text-align: center; margin-top: 20px; color: var(--gold); font-size: 0.8rem; cursor: pointer; text-decoration: underline; font-weight: bold; }
        
        .btn-outline {
            width: 100%; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3);
            padding: 14px; border-radius: 50px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; font-size: 0.8rem; text-decoration: none; display: block; text-align: center; margin-top: 10px;
        }

        /* --- MODAL ENGINE --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box { 
            background: #111; border: 1px solid var(--gold); border-radius: 20px; 
            padding: 30px; width: 100%; max-width: 400px; text-align: center;
        }

        .status-msg { margin-top: 15px; font-size: 0.85rem; text-align: center; min-height: 1.2rem; }
    </style>
</head>
<body>

    <div class="universe-bg"><div class="star-layer"></div></div>

    <div class="viewport-wrapper">
        <article class="settings-terminal">
            <header class="terminal-header">
                <h1 id="header-title" class="greeting-text">Sanctuary Records</h1>
                <div id="sub-title" class="sub-label">Verify Your Residency</div>
            </header>

            <div class="settings-content">
                <div id="status-msg" class="status-msg"></div>

                <form id="main-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="full-name" class="form-input" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email-address" class="form-input" placeholder="Email@Example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Citizen Handle</label>
                        <input type="text" id="citizen-handle" class="form-input" placeholder="@Handle" required>
                    </div>

                    <button type="submit" id="action-btn" class="btn-gold">Register Residency</button>
                    
                    <div id="guest-options">
                        <span class="restore-link" onclick="toggleModal(true)">Need to restore access?</span>
                    </div>

                    <a href="directory.html" class="btn-outline" style="margin-top: 30px;">Return to Hub</a>
                    
                    <button type="button" id="btn-logout" class="btn-outline" style="border-color: #f87171; color: #f87171; display: none;">Exit Account & Reset</button>
                </form>
            </div>
        </article>
    </div>

    <div id="restore-modal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: var(--gold); margin-top: 0;">Restore Access</h2>
            <p style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 20px;">Enter the email you used to register. We will send you a Magic Link to sign back in.</p>
            <input type="email" id="restore-email" class="form-input" placeholder="Enter your email">
            <button class="btn-gold" onclick="sendMagicLink()">Send Magic Link</button>
            <button class="btn-outline" onclick="toggleModal(false)">Cancel</button>
            <div id="modal-status" class="status-msg"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const ui = {
            form: document.getElementById('main-form'),
            name: document.getElementById('full-name'),
            email: document.getElementById('email-address'),
            handle: document.getElementById('citizen-handle'),
            btn: document.getElementById('action-btn'),
            guestOpts: document.getElementById('guest-options'),
            logout: document.getElementById('btn-logout'),
            status: document.getElementById('status-msg'),
            header: document.getElementById('header-title'),
            sub: document.getElementById('sub-title')
        };

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (user) {
                // SIGNED IN STATE
                ui.header.innerText = "Citizen Profile";
                ui.sub.innerText = "Update Sanctuary Records";
                ui.btn.innerText = "Apply Changes";
                ui.email.readOnly = true;
                ui.email.style.opacity = "0.5";
                ui.guestOpts.style.display = "none";
                ui.logout.style.display = "block";

                // Load Metadata
                ui.name.value = user.user_metadata?.full_name || "";
                ui.email.value = user.email;
                ui.handle.value = user.user_metadata?.handle || "";
            }
        }

        ui.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            ui.status.innerText = "Processing...";
            ui.status.style.color = "#fff";

            if (!user) {
                // REGISTER LOGIC
                const { error } = await supabaseClient.auth.signUp({
                    email: ui.email.value,
                    password: 'vanguard-placeholder-1234',
                    options: {
                        data: {
                            full_name: ui.name.value,
                            handle: ui.handle.value,
                            role: 'Citizen'
                        }
                    }
                });
                if (error) { ui.status.innerText = error.message; ui.status.style.color = "#f87171"; }
                else { ui.status.innerText = "Registration Sent! Check your email to verify."; ui.status.style.color = "#4ade80"; }
            } else {
                // UPDATE LOGIC
                const { error } = await supabaseClient.auth.updateUser({
                    data: { full_name: ui.name.value, handle: ui.handle.value }
                });
                if (error) { ui.status.innerText = error.message; ui.status.style.color = "#f87171"; }
                else { ui.status.innerText = "Records Updated."; ui.status.style.color = "#4ade80"; }
            }
        });

        // --- RESTORE / MAGIC LINK LOGIC ---
        function toggleModal(show) {
            document.getElementById('restore-modal').classList.toggle('active', show);
        }

        async function sendMagicLink() {
            const email = document.getElementById('restore-email').value;
            const mStatus = document.getElementById('modal-status');
            
            if (!email) { mStatus.innerText = "Enter an email first."; return; }

            const { error } = await supabaseClient.auth.signInWithOtp({ email });

            if (error) {
                mStatus.innerText = error.message;
                mStatus.style.color = "#f87171";
            } else {
                mStatus.innerText = "Magic Link Sent. Check your inbox.";
                mStatus.style.color = "#4ade80";
            }
        }

        ui.logout.addEventListener('click', async () => {
            localStorage.clear();
            await supabaseClient.auth.signOut();
            window.location.reload();
        });

        window.onload = init;
    </script>
</body>
</html>

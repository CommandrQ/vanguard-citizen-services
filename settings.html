<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Toward | Identity Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- CORE OS ARCHITECTURE --- */
        body, html {
            overflow: hidden; height: 100%; display: flex; flex-direction: column;
            background: #000; margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .scanlines { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(255, 255, 255, 0.02) 50%); background-size: 100% 4px; z-index: 1; pointer-events: none; }

        .hud-header { flex-shrink: 0; background: #000; border-bottom: 2px solid var(--v-gold); z-index: 10; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; }

        .os-viewport {
            flex: 1; overflow-y: auto; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; z-index: 5;
        }

        /* --- IDENTITY CARD & SUCCESS ANIMATION --- */
        .identity-card {
            background: #0a0a0a; border: 1px solid #333; border-top: 4px solid var(--v-gold);
            width: 100%; max-width: 600px; padding: 40px; margin-bottom: 40px;
            box-shadow: 20px 20px 40px rgba(0,0,0,1); transition: 0.3s ease;
        }

        @keyframes successPulse {
            0% { box-shadow: 0 0 0px var(--v-gold); border-color: #333; }
            50% { box-shadow: 0 0 50px var(--v-gold); border-color: var(--v-gold); }
            100% { box-shadow: 20px 20px 40px rgba(0,0,0,1); border-color: #333; }
        }
        .sync-success { animation: successPulse 0.6s var(--v-curve); }

        .status-header { margin-bottom: 30px; text-align: center; }
        
        .rank-badge {
            display: inline-block; padding: 6px 20px; border: 1px solid var(--v-gold);
            color: var(--v-gold); font-weight: 900; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 12px;
            background: rgba(212, 175, 55, 0.05);
        }

        /* --- FORM STYLING --- */
        .field-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: var(--v-gold); font-weight: 900; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        
        input {
            width: 100%; background: #111; border: 1px solid #333; padding: 12px;
            color: #fff; font-size: 1rem; border-radius: 5px; box-sizing: border-box;
        }
        input:focus { border-color: var(--v-gold); outline: none; }
        input:disabled { background: #050505; color: #555; border-color: #222; cursor: not-allowed; }

        /* --- BUTTONS --- */
        .btn-pill {
            width: 100%; font-weight: 900; padding: 15px; font-size: 0.9rem;
            border-radius: 50px; cursor: pointer; transition: 0.3s; border: none; margin-top: 10px;
        }
        .btn-active { background: var(--v-gold) !important; color: #000 !important; box-shadow: 0 4px 0 #8a6d0d; }
        .btn-active:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(212, 175, 55, 0.3); }
        
        .btn-inactive { background: transparent !important; border: 1px solid #555 !important; color: #ffffff !important; }
        .btn-inactive:hover { border-color: var(--v-gold) !important; }

        .btn-logout { background: transparent !important; border: 1px solid #f87171 !important; color: #f87171 !important; }
        .btn-logout:hover { background: rgba(248, 113, 113, 0.1) !important; }

        .sys-msg { font-size: 0.85rem; margin-top: 15px; text-align: center; font-weight: bold; min-height: 1.2em; }

        /* Hide specific areas by default */
        #profile-area, #auth-area { display: none; }

        @media (max-width: 650px) {
            .header-content { flex-direction: column; gap: 12px; text-align: center; }
            .identity-card { padding: 25px; }
        }
    </style>
</head>
<body class="fixed-hud">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="header-content">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:35px;">
                <span class="gold-text-outline" style="font-size: 1.2rem;">Identity Terminal</span>
            </div>
            <button class="btn-pill btn-active" style="padding: 6px 18px; width: auto; font-size: 0.75rem;" onclick="location.href='directory.html'">RETURN TO FORT</button>
        </div>
    </header>

    <main class="os-viewport">
        <div class="identity-card" id="main-card">
            
            <div class="status-header">
                <h2 id="welcome-msg" class="gold-text-outline" style="font-size: 1.8rem; margin: 0;">System Locked</h2>
                <div id="rank-display" class="rank-badge">AWAITING CREDENTIALS</div>
            </div>

            <div id="auth-area">
                <div class="field-group">
                    <label>Email Address</label>
                    <input type="email" id="auth-email" placeholder="name@email.com">
                </div>
                <div class="field-group">
                    <label>Security Password</label>
                    <input type="password" id="auth-password" placeholder="••••••••">
                </div>
                
                <button class="btn-pill btn-active" onclick="handleLogin()">AUTHENTICATE (LOG IN)</button>
                
                <div style="text-align: center; margin: 20px 0; color: #555; font-size: 0.8rem; font-weight: bold;">OR</div>
                
                <div class="field-group" id="signup-name-group">
                    <label>Real Name (Required for New Citizens)</label>
                    <input type="text" id="auth-name" placeholder="Citizen Name">
                </div>
                
                <button class="btn-pill btn-inactive" onclick="handleRegister()">REGISTER NEW IDENTITY</button>
            </div>

            <div id="profile-area">
                <div class="field-group">
                    <label>Full Name (Locked by Command)</label>
                    <input type="text" id="profile-name" disabled title="Contact an admin to change your legal name">
                </div>
                <div class="field-group">
                    <label>Citizen Handle (Callsign)</label>
                    <input type="text" id="profile-handle" placeholder="Callsign">
                </div>
                <div class="field-group">
                    <label>Discord ID</label>
                    <input type="text" id="profile-discord" placeholder="Username#0000">
                </div>

                <button class="btn-pill btn-active" onclick="updateProfile()">SUBMIT CHANGES</button>
                
                <div style="margin-top: 30px; border-top: 1px solid #222; padding-top: 20px;">
                    <button class="btn-pill btn-logout" onclick="handleLogout()">DISCONNECT (LOG OUT)</button>
                </div>
            </div>

            <div id="sys-response" class="sys-msg"></div>
        </div>
    </main>

    <footer class="vanguard-footer" style="padding: 20px; text-align: center; border-top: 2px solid #222; background: #000; z-index: 10;">
        <p style="color: #555; font-size: 0.7rem; margin: 0;">Vanguard OS v4.0 | Cryptographic Security Enabled</p>
    </footer>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'YOUR_SUPABASE_URL';
        const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // --- AUDIO & VISUAL ENGINE ---
        function playSuccessSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); 
            const gain = ctx.createGain();
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.connect(gain); 
            gain.connect(ctx.destination);
            osc.start(); 
            osc.stop(ctx.currentTime + 0.1);
        }

        function triggerSuccessUI() {
            const card = document.getElementById('main-card');
            card.classList.remove('sync-success'); 
            void card.offsetWidth; // Force CSS reflow to restart animation
            card.classList.add('sync-success');
            playSuccessSound();
        }

        function msg(text, color) {
            const m = document.getElementById('sys-response');
            m.innerText = text; m.style.color = color;
        }

        // --- AUTHENTICATION LOGIC ---
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                loadProfile(session.user);
            } else {
                document.getElementById('auth-area').style.display = 'block';
                document.getElementById('profile-area').style.display = 'none';
                document.getElementById('welcome-msg').innerText = "System Locked";
                document.getElementById('rank-display').innerText = "AWAITING CREDENTIALS";
            }
        }

        async function handleLogin() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return msg("Email and Password required.", "red");

            msg("Authenticating...", "#888");
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                msg("Access Denied: " + error.message, "red");
            } else {
                msg("Authentication Successful.", "var(--v-gold)");
                loadProfile(data.user);
            }
        }

        async function handleRegister() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const fullName = document.getElementById('auth-name').value.trim();
            
            if(!email || !password || !fullName) return msg("Email, Password, and Real Name required to register.", "red");

            msg("Generating encrypted credentials...", "#888");
            
            // Passes the full_name securely into metadata for the DB Trigger to catch
            const { data, error } = await supabase.auth.signUp({ 
                email, 
                password,
                options: {
                    data: { full_name: fullName }
                }
            });
            
            if (error) {
                return msg("Registry Error: " + error.message, "red");
            }

            msg("Identity Created. Welcome to Vanguard.", "var(--v-gold)");
            
            // Short delay to allow the Postgres Trigger to build the profile row
            setTimeout(() => { loadProfile(data.user); }, 1000);
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            localStorage.removeItem('vanguard_citizen'); // Clear local memory cache
            location.reload();
        }

        // --- PROFILE LOGIC ---
        async function loadProfile(user) {
            document.getElementById('auth-area').style.display = 'none';
            document.getElementById('profile-area').style.display = 'block';
            
            msg("Decrypting profile...", "#888");

            // Pull profile securely using RLS policies
            const { data, error } = await supabase.from('citizens').select('*').eq('auth_id', user.id).single();

            if (data) {
                // Cache data so Directory page can read the user's name
                localStorage.setItem('vanguard_citizen', JSON.stringify(data));
                
                // Update the visual UI elements
                document.getElementById('welcome-msg').innerText = "Identity: " + data.full_name;
                document.getElementById('rank-display').innerText = "RANK: " + (data.rank || "UNDEFINED").toUpperCase();
                
                // Fill the input boxes
                document.getElementById('profile-name').value = data.full_name;
                document.getElementById('profile-handle').value = data.handle || '';
                document.getElementById('profile-discord').value = data.discord_id || '';
                
                msg("Connection Secure.", "var(--v-gold)");
            } else if (error) {
                msg("Profile sync error: " + error.message, "red");
            }
        }

        async function updateProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return msg("Session expired. Please log in again.", "red");

            // Only grab the allowed editable fields
            const updates = {
                handle: document.getElementById('profile-handle').value.trim(),
                discord_id: document.getElementById('profile-discord').value.trim()
                
                // TODO: UPGRADE THIS JAVASCRIPT LATER
                // When ready to save complex data (like game progress or settings), 
                // you would pull the current blob_data, merge your updates, and push it here.
            };

            msg("Saving changes...", "#888");

            // RLS prevents users from updating anyone else's row
            const { error } = await supabase.from('citizens').update(updates).eq('auth_id', user.id);

            if (error) {
                msg("Error: " + error.message, "red");
            } else {
                triggerSuccessUI();
                
                // Silently refresh the local cache to ensure the Directory has the latest data
                const { data } = await supabase.from('citizens').select('*').eq('auth_id', user.id).single();
                if(data) localStorage.setItem('vanguard_citizen', JSON.stringify(data));

                msg("Changes submitted successfully.", "var(--v-gold)");
            }
        }

        // Initialize the Terminal on page load
        window.onload = checkSession;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fort Toward | Citizen Records</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* --- THE SANCTUARY ENGINE --- */
        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        /* Animated Starfield Background */
        .universe-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star-layer { position: absolute; inset: -500px; background-image: radial-gradient(2px 2px at 20px 30px, #fff, transparent); background-size: 300px 300px; animation: drift 180s linear infinite; opacity: 0.25; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(500px); } }

        .viewport-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; width: 100%; padding: 15px; box-sizing: border-box;
        }

        /* --- THE SETTINGS CARD --- */
        .settings-terminal {
            width: 100%; max-width: 600px;
            max-height: 90vh; display: flex; flex-direction: column;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .terminal-header { padding: 35px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .greeting-text { color: var(--gold); font-size: 1.8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin: 0; }
        .citizen-id-badge { 
            display: inline-block; background: rgba(212, 175, 55, 0.15); color: var(--gold); 
            padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; border: 1px solid var(--gold);
        }

        /* --- FORMS & INPUTS --- */
        .settings-content { padding: 30px; overflow-y: auto; }
        
        .form-group { margin-bottom: 25px; }
        .form-group label { 
            display: block; color: #fff; font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 2px; 
            margin-bottom: 10px; font-weight: 900;
        }

        .form-input {
            width: 100%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            padding: 16px; color: #fff; font-size: 1.1rem;
            box-sizing: border-box; transition: 0.3s;
        }
        .form-input:focus { outline: none; border-color: var(--gold); background: rgba(255, 255, 255, 0.1); }

        /* --- BUTTONS --- */
        .btn-gold {
            width: 100%; background: var(--gold); color: #000;
            border: none; padding: 18px; border-radius: 50px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem; margin-bottom: 15px;
        }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4); }

        .btn-outline {
            width: 100%; background: transparent; color: #fff;
            border: 1px solid rgba(255,255,255,0.3); padding: 16px; border-radius: 50px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; font-size: 0.8rem; text-decoration: none; display: block; text-align: center;
            box-sizing: border-box; margin-bottom: 10px;
        }
        .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.1); }

        .danger-zone { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 25px; padding-top: 25px; }
        .status-msg { margin-bottom: 20px; font-size: 0.9rem; text-align: center; min-height: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="universe-bg"><div class="star-layer"></div></div>

    <div class="viewport-wrapper">
        <article class="settings-terminal">
            <header class="terminal-header">
                <h1 class="greeting-text">Sanctuary Records</h1>
                <div id="citizen-tag" class="citizen-id-badge">Citizen Status: Unverified</div>
            </header>

            <div class="settings-content">
                <div id="status-msg" class="status-msg"></div>

                <form id="profile-form">
                    <div class="form-group">
                        <label>Registered Email</label>
                        <input type="email" id="email-display" class="form-input" readonly style="opacity: 0.4; cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label>Your Full Name</label>
                        <input type="text" id="full-name" class="form-input" placeholder="Name not set">
                    </div>

                    <button type="submit" id="submit-btn" class="btn-gold">Update My Records</button>
                    <a href="directory.html" class="btn-outline">Return to Hub</a>
                </form>

                <div class="danger-zone">
                    <button id="btn-logout" class="btn-outline" style="border-color: #f87171; color: #f87171;">Sign Out & Reset Cache</button>
                </div>
            </div>
        </article>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const ui = {
            form: document.getElementById('profile-form'),
            name: document.getElementById('full-name'),
            email: document.getElementById('email-display'),
            citizenTag: document.getElementById('citizen-tag'),
            status: document.getElementById('status-msg'),
            logout: document.getElementById('btn-reset'),
            submit: document.getElementById('submit-btn'),
            signOutBtn: document.getElementById('btn-logout')
        };

        // --- CACHE MANAGEMENT ---
        function setCache(data) { localStorage.setItem('vanguard_profile', JSON.stringify(data)); }
        function getCache() { return JSON.parse(localStorage.getItem('vanguard_profile')); }

        async function init() {
            // 1. Check cache for instant load
            const cached = getCache();
            if (cached) {
                ui.name.value = cached.name || "";
                ui.email.value = cached.email || "";
                ui.citizenTag.innerText = `Citizen Status: ${cached.role} (#${cached.number})`;
            }

            // 2. Fetch fresh data from Supabase
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (user) {
                // Fetch the user's specific row from the 'citizens' table
                const { data: profileData, error: profileError } = await supabaseClient
                    .from('citizens')
                    .select('citizen_number, role, full_name')
                    .eq('user_id', user.id)
                    .single();

                const profile = {
                    name: profileData?.full_name || user.user_metadata?.full_name || "Citizen",
                    role: profileData?.role || "Citizen",
                    number: profileData?.citizen_number || "---",
                    email: user.email
                };

                // Update UI & Cache
                ui.name.value = profile.name;
                ui.email.value = profile.email;
                ui.citizenTag.innerText = `Citizen Status: ${profile.role} (#${profile.number})`;
                setCache(profile);

                ui.submit.disabled = false;
                ui.submit.style.opacity = "1";
            } else {
                // Guest state: No redirect, but restrict editing
                ui.citizenTag.innerText = "Citizen Status: Visitor";
                ui.email.value = "Guest Access";
                ui.submit.innerText = "Join Sanctuary to Save";
                ui.submit.style.opacity = "0.5";
                ui.signOutBtn.style.display = "none";
            }
        }

        ui.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                ui.status.innerText = "Please sign in to update records.";
                ui.status.style.color = "var(--gold)";
                return;
            }

            ui.status.innerText = "Syncing with Sanctuary...";
            ui.status.style.color = "#fff";

            // Update Auth Metadata
            const { error: authError } = await supabaseClient.auth.updateUser({
                data: { full_name: ui.name.value }
            });

            // Update the Citizens Table
            const { error: dbError } = await supabaseClient
                .from('citizens')
                .update({ full_name: ui.name.value })
                .eq('user_id', user.id);

            if (authError || dbError) {
                ui.status.innerText = "Update Failed: " + (authError?.message || dbError?.message);
                ui.status.style.color = "#f87171";
            } else {
                ui.status.innerText = "Sanctuary Records Updated.";
                ui.status.style.color = "#4ade80";
                
                // Update local cache
                const current = getCache();
                setCache({ ...current, name: ui.name.value });
            }
        });

        ui.signOutBtn.addEventListener('click', async () => {
            localStorage.clear();
            await supabaseClient.auth.signOut();
            window.location.href = 'directory.html';
        });

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Terminal Settings</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .settings-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .settings-card h3 {
            color: #D4AF37;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .settings-card p {
            font-size: 0.85rem;
            margin-bottom: 15px;
            opacity: 0.7;
            line-height: 1.5;
        }

        .action-btn {
            background: rgba(15,15,15,0.9);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            width: 100%;
            transition: all 0.3s ease;
        }

        .action-btn.danger {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper" style="display: flex; flex-direction: column; height: 100vh;">
        <header id="top-glass-panel" style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h1 style="font-size: 1.2rem; color: #fff; margin: 0;">Terminal Settings</h1>
                <a href="hub.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 8px;">HUB →</a>
            </div>
        </header>

        <section style="flex-grow: 1; overflow-y: auto; padding: 25px;">
            
            <div class="settings-card">
                <h3>Local Cache</h3>
                <p>Clear temporary files to ensure you are seeing the most recent updates from Vanguard command.</p>
                <button class="action-btn" onclick="clearCache()">Flush Local Cache</button>
            </div>

            <div class="settings-card">
                <h3>System Reset</h3>
                <p>Purge all local user data and return the terminal to factory settings. This will require a new uplink.</p>
                <button class="action-btn danger" onclick="factoryReset()">Factory Reset</button>
            </div>

        </section>
    </main>

    <script>
        function clearCache() {
            alert('Cache flushed. Local systems optimal.');
        }

        function factoryReset() {
            if(confirm('Warning: This will purge all local data. Proceed?')) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Project V</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Fade In Overlay */
        #fade-in-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            z-index: 9999;
            pointer-events: none;
            animation: fadeOut 1.5s ease-out forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Space Canvas Background */
        #space-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* Main UI Layer */
        #ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding-top: 15vh; /* Center weighting */
        }

        /* Floating Logo Container */
        .logo-container {
            position: relative;
            width: 200px; /* Made the logo much smaller */
            max-width: 80%;
            animation: float 4s ease-in-out infinite;
            margin-bottom: 2rem;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* The Sheen Effect */
        .logo-sheen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; /* Let clicks pass through */
            background: linear-gradient(60deg, transparent 20%, rgba(255, 255, 255, 0.9) 50%, transparent 80%);
            /* Strict masking ensures it adheres to your image alpha channel */
            mask-image: url('./images/vanguardorglogo.png');
            mask-size: 100% 100%;
            mask-repeat: no-repeat;
            -webkit-mask-image: url('./images/vanguardorglogo.png');
            -webkit-mask-size: 100% 100%;
            -webkit-mask-repeat: no-repeat;
            animation: sheen 3s infinite;
        }

        /* Animations for Logo */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes sheen {
            0% { transform: translateX(-100%); }
            30%, 100% { transform: translateX(100%); } /* Quick sweep, then pause */
        }

        /* Carousel Menu Container */
        .menu-carousel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* Up / Down Navigation Arrows */
        .nav-arrow {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            transition: transform 0.2s, filter 0.2s;
            outline: none;
        }
        .nav-arrow:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px #00ffff);
        }
        .nav-arrow svg {
            width: 100%;
            height: 100%;
        }

        /* The Box Displaying the Link */
        .menu-display {
            width: 320px;
            height: 60px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.4);
            background: rgba(0, 255, 255, 0.05);
            border-radius: 5px;
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 15px rgba(0,255,255,0.1), 0 0 10px rgba(0,255,255,0.2);
        }

        /* The Actual Link Text */
        #current-menu-item {
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: absolute;
            width: 100%;
            text-align: center;
            transition: color 0.3s, text-shadow 0.3s;
        }
        #current-menu-item:hover {
            color: #fff;
            text-shadow: 0 0 12px #00ffff;
        }

        /* JS Trigerred Animation Classes */
        .slide-out-up { animation: slideOutUp 0.3s forwards; }
        .slide-in-up { animation: slideInUp 0.3s forwards; }
        .slide-out-down { animation: slideOutDown 0.3s forwards; }
        .slide-in-down { animation: slideInDown 0.3s forwards; }

        @keyframes slideOutUp { to { transform: translateY(-150%); opacity: 0; } }
        @keyframes slideInUp { from { transform: translateY(150%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideOutDown { to { transform: translateY(150%); opacity: 0; } }
        @keyframes slideInDown { from { transform: translateY(-150%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Footer Banner */
        .footer-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px; 
            background: rgba(10, 15, 30, 0.9);
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 -5px 15px rgba(0, 255, 255, 0.1);
            overflow: hidden; 
        }

        .footer-text-container {
            display: flex;
            flex-direction: column;
            animation: bannerWipe 8s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }

        .footer-text {
            height: 50px; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            color: #a0c4ff;
        }

        .highlight-text {
            color: #00ffff;
            font-weight: 700;
            text-shadow: 0 0 5px #00ffff;
        }

        @keyframes bannerWipe {
            0%, 40% { transform: translateY(0); } 
            45%, 85% { transform: translateY(-50px); } 
            90%, 100% { transform: translateY(-100px); } 
        }
        
    </style>
</head>
<body>
    <div id="fade-in-overlay"></div>

    <canvas id="space-canvas"></canvas>

    <div id="ui-layer">
        <div class="logo-container">
            <img src="./images/vanguardorglogo.png" alt="Vanguard Organization Logo">
            <div class="logo-sheen"></div>
        </div>

        <div class="menu-carousel">
            <button id="btn-up" class="nav-arrow" aria-label="Previous Menu Option">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
            </button>
            
            <div class="menu-display">
                <a href="#" id="current-menu-item">About The Vanguard</a>
            </div>

            <button id="btn-down" class="nav-arrow" aria-label="Next Menu Option">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <div class="footer-banner">
        <div class="footer-text-container">
            <div class="footer-text">&copy; 2026 Vanguard Citizen Services</div>
            <div class="footer-text highlight-text">Empower . Educate . Elevate</div>
            <div class="footer-text">&copy; 2026 Vanguard Citizen Services</div>
        </div>
    </div>

    <script src="force-refresh.js"></script>

    <script>
        // --- Menu Carousel Logic ---
        const menuItems = [
            { text: "About The Vanguard", link: "#" },
            { text: "Our Team", link: "#" },
            { text: "Contact Us", link: "#" }
        ];
        
        let currentIndex = 0;
        const currentMenuItem = document.getElementById('current-menu-item');
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        let isAnimating = false; // Prevents spam clicking the arrows

        function cycleMenu(direction) {
            if (isAnimating) return;
            isAnimating = true;

            // Determine exit and entry animations
            const exitClass = direction === 'up' ? 'slide-out-up' : 'slide-out-down';
            const enterClass = direction === 'up' ? 'slide-in-up' : 'slide-in-down';

            // Trigger exit
            currentMenuItem.classList.add(exitClass);

            setTimeout(() => {
                // Update Index
                if (direction === 'up') {
                    currentIndex = (currentIndex - 1 + menuItems.length) % menuItems.length;
                } else {
                    currentIndex = (currentIndex + 1) % menuItems.length;
                }

                // Update DOM content
                currentMenuItem.textContent = menuItems[currentIndex].text;
                currentMenuItem.href = menuItems[currentIndex].link;

                // Swap classes to trigger entry animation
                currentMenuItem.classList.remove(exitClass);
                currentMenuItem.classList.add(enterClass);

                // Clean up classes and release lock
                setTimeout(() => {
                    currentMenuItem.classList.remove(enterClass);
                    isAnimating = false;
                }, 300); // Wait for entry to finish
            }, 300); // Wait for exit to finish
        }

        btnUp.addEventListener('click', () => cycleMenu('up'));
        btnDown.addEventListener('click', () => cycleMenu('down'));


        // --- 3D Space Warp Effect Logic ---
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let stars = [];
        const numStars = 500; 
        const speed = 3; 

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = (Math.random() - 0.5) * width;
                this.y = (Math.random() - 0.5) * height;
                this.z = Math.random() * width;
                this.pz = this.z;
            }
            update() {
                this.z -= speed;
                if (this.z < 1) {
                    this.reset();
                    this.z = width;
                }
            }
            draw() {
                let sx = (this.x / this.z) * width + width / 2;
                let sy = (this.y / this.z) * height + height / 2;
                let r = (1 - this.z / width) * 3; 

                let px = (this.x / this.pz) * width + width / 2;
                let py = (this.y / this.pz) * height + height / 2;
                
                this.pz = this.z;

                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.lineWidth = r;
                ctx.strokeStyle = `rgba(200, 240, 255, ${1 - this.z / width})`; 
                ctx.stroke();
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push(new Star());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; 
            ctx.fillRect(0, 0, width, height);
            
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        initStars();
        animate();
    </script>
</body>
</html>
